name: Deploy Pages
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
# 배포를 직렬 큐잉(취소 안 함) → 동시배포 충돌("try again later") 방지
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      # 배포 일시 실패는 다음 푸시가 자동 복구 → 실패메일 방지(continue-on-error)
      - id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true
