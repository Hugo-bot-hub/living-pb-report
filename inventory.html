<script>
(function(){
const R=DATA.rows,W=DATA.weeks,TODAY=new Date(DATA.today+"T00:00:00");
const fmt=n=>Math.round(n).toLocaleString('ko-KR');
const won=n=>n>=1e8?(n/1e8).toFixed(2)+'억':n>=1e4?fmt(n/1e4)+'만':fmt(n);
let LEAD=8,statusFilter='all',sortKey='min',sortDir=1,q='',viewMode='group';
function statusFor(off,proj,soojin){if(off)return 'season';if(proj<=0||soojin===null||soojin>78)return 'dead';if(soojin<=LEAD)return 'crit';if(soojin>52)return 'warn';return 'good';}
const LB={crit:'재발주 시급',warn:'과잉재고',good:'정상',dead:'데드/정지',season:'비시즌 대기'};
const months=w=>w===null?'∞':(w/4.345).toFixed(1)+'개월';
const seasonLab=w=>w===null?'—':(w/4.345).toFixed(0)+'개월(시즌)';
const edate=w=>{if(w===null)return '—';const d=new Date(TODAY.getTime()+w*7*864e5);if(d.getFullYear()>2032)return '장기';return d.getFullYear()+'.'+(d.getMonth()+1)+'.'+d.getDate();};
const tArrow=t=>t==='up'?'▲':t==='down'?'▼':'─';
const bar=(st,soojin,isSea)=>{let pct=isSea?100:(soojin===null?100:Math.max(4,Math.min(100,(soojin/78)*100)));return `<div class="bar"><i style="width:${pct}%;background:var(--${st})"></i></div>`;};
function computeAll(){
  R.forEach(p=>{
    p._st=statusFor(p.offseason,p.proj,p.soojin);
    let cnt={crit:0,warn:0,good:0,dead:0,season:0}, minSo=null;
    p.skus.forEach(s=>{
      s._st = p.offseason ? 'season' : statusFor(false,s.vel,s.soojin);
      cnt[s._st]++;
      if(!p.offseason && s._st!=='dead' && s.soojin!==null){ if(minSo===null||s.soojin<minSo) minSo=s.soojin; }
    });
    p._cnt=cnt; p._min=minSo; p._critN=cnt.crit;
  });
}
const flatList=()=>R.flatMap(p=>p.skus.map(s=>({...s,product:p.name,season:p.season,offseason:p.offseason,trend:p.trend,_st:s._st})));
function critPanel(){
  const c=flatList().filter(s=>s._st==='crit').sort((a,b)=>a.soojin-b.soojin);
  if(!c.length) return '';
  const rows=c.slice(0,14).map(s=>`<div class="pl"><span class="dot crit"></span>
    <span class="nm">${s.sku} <small>· 재고 ${fmt(s.cn)}EA</small></span>
    <span class="mt crit">${months(s.soojin)}</span></div>`).join('');
  return `<div class="card" style="border-color:var(--crit)"><h3><span class="dot crit"></span>지금 재발주할 옵션 — 리드타임(${LEAD}주) 내 소진<span class="n">${c.length}개</span></h3><div class="plist">${rows}</div></div>`;
}
function pills(c){let o='';if(c.crit)o+=`<span class="pill crit"><i></i>${c.crit}</span>`;if(c.warn)o+=`<span class="pill warn"><i></i>${c.warn}</span>`;if(c.dead)o+=`<span class="pill dead"><i></i>${c.dead}</span>`;return o?`<span class="pills">${o}</span>`:'<span class="sea">—</span>';}
function minCell(p){if(p.offseason)return '<span class="minm mut">비시즌</span>';if(p._min===null)return '<span class="minm mut">—</span>';const st=statusFor(false,1,p._min);return `<span class="minm ${st}">${months(p._min)}</span>`;}
function kpis(){
  const prodN=R.length,skuN=R.reduce((a,p)=>a+p.skus.length,0),unit=R.reduce((a,p)=>a+p.cn,0),val=R.reduce((a,p)=>a+p.cl,0);
  const critO=flatList().filter(s=>s._st==='crit').length;
  const overO=flatList().filter(s=>s._st==='warn'||s._st==='dead').length;
  const stuck=R.filter(p=>p._st==='warn'||p._st==='dead'||p._st==='season').reduce((a,p)=>a+p.cl,0);
  return `
  <div class="kpi"><div class="lab">상품 / 옵션</div><div class="val">${prodN}<small>/ ${skuN}</small></div></div>
  <div class="kpi"><div class="lab">총 현재고</div><div class="val">${fmt(unit)}<small>EA</small></div></div>
  <div class="kpi"><div class="lab">재고 매입대금</div><div class="val">${won(val)}<small>원</small></div></div>
  <div class="kpi crit"><div class="lab">재발주 시급 옵션</div><div class="val">${critO}<small>개</small></div></div>
  <div class="kpi warn"><div class="lab">과잉·데드 옵션</div><div class="val">${overO}<small>개</small></div></div>
  <div class="kpi season"><div class="lab">과잉+비시즌 묶임</div><div class="val">${won(stuck)}<small>원</small></div></div>`;
}
const matchesQ=(t)=>!q||t.toLowerCase().includes(q.toLowerCase());
function groupTable(){
  const active = statusFilter!=='all' || q;
  let list=R.filter(p=>{
    const prodMatch=matchesQ(p.name);
    const skuHit=p.skus.some(s=>(statusFilter==='all'||s._st===statusFilter)&&(prodMatch||matchesQ(s.sku)));
    const pStatusHit=(statusFilter==='all'||p._st===statusFilter)&&prodMatch;
    return skuHit||pStatusHit;
  });
  list.sort((a,b)=>{let va,vb;
    if(sortKey==='min'){va=a._min===null?9e9:a._min;vb=b._min===null?9e9:b._min;}
    else if(sortKey==='soojin'){va=a.soojin===null?9e9:a.soojin;vb=b.soojin===null?9e9:b.soojin;}
    else if(sortKey==='name')return a.name.localeCompare(b.name)*sortDir;
    else{va=a[sortKey];vb=b[sortKey];}
    return (va<vb?-1:va>vb?1:0)*sortDir;});
  const th=(k,l,left)=>`<th class="${left?'l':''}" data-k="${k}">${l} <span class="ar">${sortKey===k?(sortDir>0?'▲':'▼'):''}</span></th>`;
  let body='';
  list.forEach((p,pi)=>{
    const soLab=p._st==='season'?`<span class="chip season">${seasonLab(p.soojin_season)}</span>`:`<span class="chip ${p._st}">${months(p.soojin)}</span>`;
    body+=`<tr class="prow ${p._critN?'hascrit':''}" data-p="${pi}">
      <td class="l"><span class="tw">▶</span>${p.name} <span class="count">· ${p.skus.length}옵션</span></td>
      <td class="l"><span class="sea">${p.season}${p.offseason?' · 비시즌':''}</span></td>
      <td>${fmt(p.cn)}</td><td>${won(p.cl)}</td>
      <td>${soLab}</td>
      <td class="l">${pills(p._cnt)}</td>
      <td>${minCell(p)}</td>
      <td><span class="tr ${p.trend}">${tArrow(p.trend)}</span></td>
      <td class="l"><span class="chip ${p._st}">${LB[p._st]}</span></td></tr>`;
    let subs=[...p.skus];
    if(statusFilter!=='all' && !matchesQ(p.name)) subs=subs.filter(s=>s._st===statusFilter);
    if(q && !matchesQ(p.name)) subs=subs.filter(s=>matchesQ(s.sku));
    subs.sort((a,b)=>{const av=a.soojin===null?9e9:a.soojin,bv=b.soojin===null?9e9:b.soojin;return av-bv;});
    subs.forEach(s=>{
      const isSea=s._st==='season';
      const sl=isSea?`<span class="chip season">${seasonLab(s.soojin_season)}</span>`:`<span class="chip ${s._st}">${months(s.soojin)}</span>`;
      body+=`<tr class="srow p${pi} ${active?'':'hidden'}">
        <td class="l">${s.sku}</td><td class="l"></td><td>${fmt(s.cn)}</td><td>${won(s.cl)}</td>
        <td>${sl}</td><td class="l">${bar(s._st,s.soojin,isSea)}</td>
        <td>${isSea?'—':edate(s.soojin)}</td><td></td>
        <td class="l"><span class="chip ${s._st}">${LB[s._st]}</span></td></tr>`;
    });
  });
  return `<div class="scroll"><table><thead><tr>
    ${th('name','상품 / 옵션',1)}<th class="l">계절</th>${th('cn','현재고',0)}${th('cl','재고금액',0)}
    ${th('soojin','상품 소진',0)}<th class="l">옵션 위험</th>${th('min','최단옵션',0)}<th>추세</th><th class="l">상품 상태</th>
    </tr></thead><tbody>${body}</tbody></table></div>`;
}
function flatTable(){
  let list=flatList().filter(s=>(statusFilter==='all'||s._st===statusFilter)&&(matchesQ(s.sku)||matchesQ(s.product)));
  list.sort((a,b)=>{let va,vb;
    if(sortKey==='soojin'||sortKey==='min'){va=a.soojin===null?9e9:a.soojin;vb=b.soojin===null?9e9:b.soojin;}
    else if(sortKey==='name')return a.sku.localeCompare(b.sku)*sortDir;
    else{va=a[sortKey]!==undefined?a[sortKey]:9e9;vb=b[sortKey]!==undefined?b[sortKey]:9e9;}
    return (va<vb?-1:va>vb?1:0)*sortDir;});
  const th=(k,l,left)=>`<th class="${left?'l':''}" data-k="${k}">${l} <span class="ar">${sortKey===k?(sortDir>0?'▲':'▼'):''}</span></th>`;
  const body=list.map(s=>{const isSea=s._st==='season';
    const sl=isSea?`<span class="chip season">${seasonLab(s.soojin_season)}</span>`:`<span class="chip ${s._st}">${months(s.soojin)}</span>`;
    return `<tr class="frow">
      <td class="l">${s.sku}</td><td class="l pn">${s.product}</td>
      <td>${fmt(s.cn)}</td><td>${won(s.cl)}</td><td>${s.vel}</td>
      <td>${sl}</td><td class="l" style="min-width:90px">${bar(s._st,s.soojin,isSea)}</td>
      <td>${isSea?'—':edate(s.soojin)}</td><td class="l"><span class="chip ${s._st}">${LB[s._st]}</span></td></tr>`;}).join('');
  return `<div class="scroll"><table><thead><tr>
    ${th('name','옵션',1)}<th class="l">상품</th>${th('cn','현재고',0)}${th('cl','재고금액',0)}${th('vel','옵션속도',0)}
    ${th('soojin','소진기간',0)}<th class="l">게이지</th><th>예상소진</th><th class="l">상태</th>
    </tr></thead><tbody>${body}</tbody></table></div>`;
}
const table=()=>viewMode==='flat'?flatTable():groupTable();
function render(){
  computeAll();
  document.getElementById('app').innerHTML=`<div class="wrap">
   <div class="eyebrow">layer · 재고 S&OP 시뮬레이션</div>
   <h1>재고 소진 예측 대시보드 <span style="font-size:13px;font-weight:600;color:var(--muted)">· SKU(옵션) 단위</span></h1>
   <div class="sub">현재고 · <b>추세(최근 vs 연중)</b> · <b>시즌</b> 반영. 상품이 평균은 멀쩡해도 <b>급한 옵션이 숨어있으면</b> 아래 패널·옵션위험 컬럼·옵션전체보기로 바로 드러납니다.
     &nbsp;기준일 ${DATA.today} · 현 시즌 <b>${DATA.season}</b></div>
   <div class="kpis">${kpis()}</div>
   ${critPanel()}
   <div class="controls">
     <div class="control"><label>보기</label><div class="seg" id="view">
       <button data-v="group" class="${viewMode==='group'?'on':''}">상품 묶음</button><button data-v="flat" class="${viewMode==='flat'?'on':''}">옵션 전체</button></div></div>
     <div class="control"><label>리드타임 (재발주~입고, 주)</label><div class="rowc"><input type="range" id="lead" min="2" max="16" value="${LEAD}"><span class="lt-val" id="ltv">${LEAD}주</span></div></div>
     <div class="control"><label>상태 필터</label><div class="seg" id="filter">
       <button data-f="all" class="${statusFilter==='all'?'on':''}">전체</button><button data-f="crit" class="${statusFilter==='crit'?'on':''}">재발주</button>
       <button data-f="warn" class="${statusFilter==='warn'?'on':''}">과잉</button><button data-f="season" class="${statusFilter==='season'?'on':''}">비시즌</button>
       <button data-f="good" class="${statusFilter==='good'?'on':''}">정상</button><button data-f="dead" class="${statusFilter==='dead'?'on':''}">데드</button></div></div>
     <div class="control"><label>검색</label><input type="search" id="q" placeholder="상품·옵션명…" value="${q}"></div>
     <div class="control" style="margin-left:auto"><label>범례</label><div class="legend">
       <span><span class="dot crit"></span>재발주</span><span><span class="dot good"></span>정상</span><span><span class="dot warn"></span>과잉</span>
       <span><span class="dot season"></span>비시즌</span><span><span class="dot dead"></span>데드</span></div></div>
   </div>
   <div class="tablewrap"><h3>${viewMode==='flat'?'옵션 전체 — 소진 빠른 순':'상품·옵션별 소진 시뮬레이션'} <span style="font-weight:500;color:var(--muted);font-size:12px">· ${viewMode==='flat'?'모든 옵션 평평하게':'상품행 클릭=옵션 펼침'} · 헤더=정렬 · 필터/검색 시 자동 펼침</span></h3>${table()}</div>
   <div class="foot">
     <b>옵션 위험</b> 컬럼 = 그 상품 안 옵션들의 <span style="color:var(--crit)">🔴재발주</span>/<span style="color:var(--warn)">🟡과잉</span>/<span style="color:var(--dead)">⚫데드</span> 개수, <b>최단옵션</b> = 가장 빨리 소진되는 옵션의 소진기간. 상품 평균이 정상이어도 여기가 빨가면 그 안에 급한 옵션이 있다는 뜻.
     <br><b>모델</b> — 상품 예측속도(시즌·추세 반영) × (옵션 누적판매÷상품 누적판매) = 옵션속도. 소진기간=현재고÷옵션속도. 재발주=리드타임(${LEAD}주)내 · 과잉=12개월+ · 비시즌=시즌속도판단 · 데드=18개월+/무판매.
   </div></div>`;
  bind();
}
function bind(){
  document.getElementById('view').onclick=e=>{const b=e.target.closest('button');if(!b)return;viewMode=b.dataset.v;render();};
  document.getElementById('lead').oninput=e=>{LEAD=+e.target.value;document.getElementById('ltv').textContent=LEAD+'주';render();};
  document.getElementById('q').oninput=e=>{q=e.target.value;refresh();};
  document.getElementById('filter').onclick=e=>{const b=e.target.closest('button');if(!b)return;statusFilter=b.dataset.f;
    [...e.currentTarget.children].forEach(c=>c.classList.toggle('on',c===b));refresh();};
  bindTable();
}
function refresh(){computeAll();const tw=document.querySelector('.tablewrap');tw.querySelector('.scroll').outerHTML=table();bindTable();}
function bindTable(){
  document.querySelectorAll('thead th[data-k]').forEach(th=>th.onclick=()=>{const k=th.dataset.k;if(sortKey===k)sortDir*=-1;else{sortKey=k;sortDir=1;}refresh();});
  document.querySelectorAll('tr.prow').forEach(tr=>tr.onclick=()=>{tr.classList.toggle('open');document.querySelectorAll('tr.srow.p'+tr.dataset.p).forEach(c=>c.classList.toggle('hidden'));});
}
render();
})();
</script>
