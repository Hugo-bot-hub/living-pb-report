<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>숏헤드 PB 대시보드 · 리빙/가구</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet">
<style>
:root{--bg:#f5f6f8;--card:#fff;--border:#e2e4ea;--text:#1a1d27;--text2:#6b6e7d;--text3:#9a9dad;--accent:#6c5ce7;--green:#00b894;--red:#ff6b6b;--orange:#e6a817;--blue:#3b82f6;--purple:#8b5cf6}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Pretendard',sans-serif;font-size:15px;line-height:1.5}
.top-bar{position:sticky;top:0;z-index:100;background:rgba(255,255,255,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:10px 28px;display:flex;align-items:center;justify-content:space-between;height:56px}
.top-bar .logo{font-weight:800;font-size:16px}
.top-bar .logo .mission{color:var(--text2);font-weight:500;font-size:13px;margin-left:8px}
.top-bar .meta{font-size:13px;color:var(--text2)}
.top-bar .v-badge{background:var(--accent);color:#fff;padding:2px 8px;border-radius:4px;font-size:12px;font-weight:700}
.div-nav{display:flex;gap:8px;background:var(--card);border-bottom:1px solid var(--border);padding:10px 28px;position:sticky;top:56px;z-index:99}
.div-btn{padding:8px 20px;font-size:15px;font-weight:700;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text2);cursor:pointer;font-family:inherit}
.div-btn.active{background:var(--text);color:#fff;border-color:var(--text)}
.view-nav{display:flex;background:var(--card);border-bottom:1px solid var(--border);padding:0 28px;overflow-x:auto;position:sticky;top:112px;z-index:98}
.view-btn{padding:11px 16px;font-size:14px;font-weight:600;color:var(--text2);background:none;border:none;cursor:pointer;position:relative;white-space:nowrap;font-family:inherit}
.view-btn:hover{color:var(--text)}
.view-btn.active{color:var(--accent)}
.view-btn.active::after{content:'';position:absolute;bottom:0;left:8px;right:8px;height:2px;background:var(--accent);border-radius:1px}
.wrap{max-width:1180px;margin:0 auto;padding:20px 28px 60px}
.selector{margin:6px 0 18px}
.sel-group{margin-bottom:10px}
.sel-group .glabel{font-size:12px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px}
.sel-group .glabel .strat{padding:1px 7px;border-radius:4px;font-size:11px;margin-left:4px}
.strat.internal{background:rgba(59,130,246,.12);color:var(--blue)}
.strat.external{background:rgba(230,168,23,.14);color:var(--orange)}
.strat.competitor{background:rgba(154,157,173,.18);color:var(--text2)}
.pill-btn.comp.active{background:var(--text2);border-color:var(--text2)}
.pills{display:flex;flex-wrap:wrap;gap:8px}
.pill-btn{padding:7px 14px;border-radius:20px;border:1px solid var(--border);background:var(--card);color:var(--text2);cursor:pointer;font-family:inherit;font-size:14px;font-weight:600}
.pill-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.subtabs{display:flex;gap:4px;border-bottom:1px solid var(--border);margin-bottom:16px;overflow-x:auto}
.subtab{padding:9px 15px;font-size:13.5px;font-weight:600;color:var(--text2);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;font-family:inherit;white-space:nowrap}
.subtab.active{color:var(--accent);border-bottom-color:var(--accent)}
.grid{display:grid;gap:14px}
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:16px}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 16px;border-left:3px solid var(--accent)}
.kpi .lbl{font-size:12px;color:var(--text2);text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px;font-weight:600}
.kpi .val{font-size:22px;font-weight:800}
.kpi .val small{font-size:13px;color:var(--text2);font-weight:600}
.kpi .sub{font-size:12px;color:var(--text3);margin-top:3px}
.chg.up{color:var(--green);font-weight:700}
.chg.dn{color:var(--red);font-weight:700}
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;box-shadow:0 1px 2px rgba(0,0,0,.03);margin-bottom:16px}
.card h3{font-size:15px;font-weight:700;margin-bottom:12px}
.card .note{font-size:12px;color:var(--text3);margin-top:8px;font-style:italic}
.chart-box{position:relative;height:300px}
.chart-box.sm{height:260px}
.chart-box.xs{height:168px}
.mm-lbl{font-size:12px;color:var(--text2);font-weight:700;margin-bottom:4px;text-align:center}
.wbadge{display:inline-block;background:var(--bg);border:1px solid var(--border);color:var(--text3);font-size:11px;font-weight:600;padding:1px 8px;border-radius:10px;margin-left:6px;vertical-align:middle}
table{width:100%;border-collapse:collapse;font-size:13.5px}
th{text-align:left;padding:9px 6px;border-bottom:1px solid var(--border);color:var(--text2);font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.3px}
td{padding:9px 6px;border-bottom:1px solid #f0f1f5}
tr:hover td{background:rgba(108,92,231,.04)}
td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
.self-row{background:rgba(108,92,231,.05);font-weight:700}
.pill{display:inline-block;padding:1px 8px;border-radius:10px;font-size:12px;font-weight:600}
.pill.self{background:rgba(108,92,231,.12);color:var(--accent)}
.pill.comp{background:rgba(154,157,173,.14);color:var(--text2)}
.pill.warn{background:rgba(230,168,23,.16);color:var(--orange)}
.pill.good{background:rgba(0,184,148,.14);color:var(--green)}
.insight{background:linear-gradient(135deg,rgba(108,92,231,.06),rgba(162,155,254,.04));border-left:3px solid var(--accent);padding:12px 14px;border-radius:6px;margin:0 0 16px;font-size:14px;line-height:1.6}
.ph{padding:40px;text-align:center;color:var(--text3);font-size:14px;background:var(--card);border:1px dashed var(--border);border-radius:10px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:760px){.grid2{grid-template-columns:1fr}}
.prod-head{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.prod-head .nm{font-size:19px;font-weight:800}
.prod-head .pidt{font-size:12px;color:var(--text3);margin-left:auto}
</style>
</head>
<body>
<div class="top-bar">
  <div class="logo">🏠 숏헤드 PB 대시보드<span class="mission">리빙 · 가구 통합 모니터링</span></div>
  <div class="meta"><span class="v-badge" id="v-badge">v19</span> <span id="upd"></span></div>
</div>
<div class="div-nav" id="div-nav"></div>
<div class="view-nav" id="view-nav"></div>
<div class="wrap" id="content"></div>

<script>
let D=null, M=null;
const S={div:'living', view:'overview', pid:null, sub:'metrics'};
const charts={};
let LB=[];
const COL={self:'#6c5ce7', c1:'#e6a817', c2:'#8b5cf6', green:'#00b894', red:'#ff6b6b', blue:'#3b82f6', gray:'#b0b3c0'};
const CHANNEL_COLORS=['#6c5ce7','#00b894','#e6a817','#3b82f6','#ff6b6b','#8b5cf6','#00cec9','#fab1a0','#74b9ff','#a29bfe','#55efc4','#ffeaa7','#fd79a8','#636e72','#dfe6e9'];

function destroyCharts(){ Object.values(charts).forEach(c=>{try{c.destroy();}catch(e){}}); for(const k in charts) delete charts[k]; }
function won(n){ if(n==null||isNaN(n)) return '-'; const a=Math.abs(n); if(a>=1e8) return (n/1e8).toFixed(1)+'억'; if(a>=1e4) return Math.round(n/1e4).toLocaleString()+'만'; return Math.round(n).toLocaleString(); }
function pct(n,d){ return (n==null||isNaN(n))?'-':n.toFixed(d==null?2:d)+'%'; }
function meta(pid){ return (D.products&&D.products[pid])||{}; }
function sn(pid){ return meta(pid).shortName||pid; }
function selfPids(div){ return ((D.meta.divisions&&D.meta.divisions[div])||[]).filter(p=>meta(p).role==='self'); }
function compsOf(pid){ return Object.keys(D.products).filter(k=>String(meta(k).vs)===String(pid)); }
function divOf(pid){ const m=meta(pid); if(m.div) return m.div; if(m.vs) return meta(m.vs).div||'living'; return 'living'; }
function benchKey(pid){ if(divOf(pid)==='living') return 'bedding'; const g=meta(pid).group||(meta(pid).vs&&meta(meta(pid).vs).group)||''; return g==='매트리스'?'mattress':'bed'; }
function daily(pid){ return (D.daily&&D.daily[pid])||[]; }
function sumF(arr,f,n,skip){ skip=skip||0; const s=arr.slice(Math.max(0,arr.length-n-skip), arr.length-skip); return s.reduce((a,r)=>a+(r[f]||0),0); }
function unitPrice(pid){ if(M&&M.decomp&&M.decomp[pid]){ const dc=M.decomp[pid]; const g=dc.reduce((a,r)=>a+(r.gmv||0),0), q=dc.reduce((a,r)=>a+(r.qty||0),0); return q?Math.round(g/q):null; } return null; }
function srpBest(pid){ const rows=(D.srpMatrix||[]).filter(r=>String(r.pid)===String(pid)); if(!rows.length) return null; return Math.min.apply(null, rows.map(r=>r.best)); }
// SRP 대표 순위 = 노출(imp) 가중 평균순위 (단발 best보다 정직). 0-based → 표시단계 +1
function srpAvg(pid){ const rows=(D.srpMatrix||[]).filter(r=>String(r.pid)===String(pid)); if(!rows.length) return null; var wr=0,wi=0; rows.forEach(function(r){var im=r.imp||1; wr+=(r.rank||0)*im; wi+=im;}); return wi?wr/wi:null; }
function srpKwCnt(pid){ return (D.srpMatrix||[]).filter(r=>String(r.pid)===String(pid)).length; }
// SRP object_idx는 0-based(0=1위) → 사람이 읽는 순위는 +1 (표시단계에서만 보정, 데이터는 raw)
function dispRank(v){ return (v==null||isNaN(v))?'-':(v+1).toFixed(1); }
function dispBest(v){ return (v==null||isNaN(v))?'-':(v+1); }
// 계열 고유색 팔레트: seriesPids 순서(0=우리)대로 배정, 어떤 두 시리즈도 같은 색 금지.
// 우리(0)=진한 보라 굵은 실선, 경쟁(1+)=고유색 파선.
const SERIES_PAL=['#6c5ce7','#e67e22','#16a085','#e74c3c','#2980b9','#8e44ad','#f39c12','#27ae60'];
function serColor(i){ return SERIES_PAL[i%SERIES_PAL.length]; }
function serStyle(i){ return {borderColor:serColor(i),borderWidth:i===0?3:2,borderDash:i===0?[]:[6,4]}; }
// 전역 규칙: 포커스(우리 선택) 상품 시리즈는 어느 차트에서나 항상 보라 #6C5CE7. 그 외 시리즈는 index별 팔레트.
function seriesColor(pid,i){ return String(pid)===String(S.pid) ? COL.self : serColor(i); }

function renderNav(){
  document.getElementById('v-badge').textContent = D.meta.version||'v19';
  document.getElementById('upd').textContent = '기준 '+(D.meta.lastUpdate||'');
  document.getElementById('div-nav').innerHTML=[['living','🛋️ 리빙'],['furniture','🛏️ 가구']].map(function(a){return '<button class="div-btn '+(S.div===a[0]?'active':'')+'" onclick="setDiv(\''+a[0]+'\')">'+a[1]+'</button>';}).join('');
  const views = S.div==='living' ? [['overview','📊 Overview'],['detail','🔎 상품 상세'],['radar','🚨 경쟁레이더']]
    : [['overview','📊 Overview'],['detail','🔎 상품 상세'],['mprice','📐 매트리스 객단가'],['attach','🔗 프레임 합구매'],['radar','🚨 경쟁레이더']];
  document.getElementById('view-nav').innerHTML = views.map(function(a){return '<button class="view-btn '+(S.view===a[0]?'active':'')+'" onclick="setView(\''+a[0]+'\')">'+a[1]+'</button>';}).join('');
}
function setDiv(d){ S.div=d; S.view='overview'; S.pid=null; render(); }
function setView(v){ S.view=v; if(v==='detail'&&!S.pid){ S.pid=selfPids(S.div)[0]; } render(); }
function setPid(p){ S.pid=p; S.sub='metrics'; render(); }
function setSub(s){ S.sub=s; render(); }

function render(){
  destroyCharts(); renderNav();
  const c=document.getElementById('content');
  try{
    if(S.view==='overview'){ c.innerHTML=viewOverview(); buildOverviewCharts(); }
    else if(S.view==='detail'){ c.innerHTML=viewDetail(); buildDetailCharts(); }
    else if(S.view==='mprice'){ c.innerHTML=viewMprice(); buildMpriceCharts(); }
    else if(S.view==='attach'){ c.innerHTML=viewAttach(); buildAttachCharts(); }
    else if(S.view==='radar'){ c.innerHTML=viewRadar(); }
  }catch(e){ c.innerHTML='<div class="ph">렌더 오류: '+e.message+'</div>'; console.error(e); }
}

function viewOverview(){
  const sp=selfPids(S.div);
  const rows=sp.map(function(pid){
    const dd=daily(pid); const last=dd[dd.length-1]||{};
    const r7=sumF(dd,'gmv',7), p7=sumF(dd,'gmv',7,7); const wow=p7? (r7-p7)/p7*100 : null;
    const imp=sumF(dd,'imp',7), pdp=sumF(dd,'pdp',7), pu=sumF(dd,'pdp_uv',7), bu=sumF(dd,'buy_uv',7);
    const ctr=imp? pdp/imp*100:null, cvr=pu? bu/pu*100:null;
    const up=unitPrice(pid); const best=srpBest(pid); const savg=srpAvg(pid); const m=meta(pid);
    return '<tr>'+
      '<td>'+(m.emoji||'')+' <b>'+sn(pid)+'</b> <span class="pill '+(m.strategy==='internal'?'self':'warn')+'">'+(m.strategy==='internal'?'내부/SRP':'외부')+'</span><div style="font-size:11px;color:var(--text3)">'+(m.group||'')+' · '+pid+'</div></td>'+
      '<td class="num">'+won(last.gmv)+'</td>'+
      '<td class="num">'+won(r7)+'</td>'+
      '<td class="num '+(wow==null?'':wow>=0?'chg up':'chg dn')+'">'+(wow==null?'-':(wow>=0?'+':'')+wow.toFixed(0)+'%')+'</td>'+
      '<td class="num">'+pct(ctr)+'</td>'+
      '<td class="num">'+pct(cvr)+'</td>'+
      '<td class="num">'+(savg==null?'-':'<b>'+dispRank(savg)+'위</b><div style="font-size:10px;color:var(--text3);font-weight:400">최고 '+dispBest(best)+'위 · '+srpKwCnt(pid)+'kw</div>')+'</td>'+
      '<td class="num">'+(up?won(up):(m.price?won(m.price)+' <span style="color:var(--text3);font-size:11px">(표시가)</span>':'-'))+'</td>'+
    '</tr>';
  }).join('');
  const insight = S.div==='living'
    ? '리빙 자사 침구 3종. 60수·소프트워싱 = 인앱 SRP 전략, 알러지케어 = 외부 확장. 최근 7일 기준 관제.'
    : '가구 자사 6종. 매트리스3 = 인앱 SRP, 침대프레임3 = 외부 전략. <b>실객단가는 표시가와 크게 다름</b>(사이즈·경도). 상세·객단가·합구매 탭 참조.';
  const trend='<div class="card"><h3>📈 상품별 지표 추세 <span class="wbadge">GMV·CTR·CVR 전체이력</span><span class="wbadge">SRP 최근60일</span></h3>'+
    sp.map(function(pid){return '<div style="margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid #f0f1f5"><div style="font-size:13.5px;font-weight:700;margin-bottom:6px">'+(meta(pid).emoji||'')+' '+sn(pid)+'</div><div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(150px,1fr))">'+
      '<div><div class="mm-lbl">GMV</div><div class="chart-box xs"><canvas id="ov-gmv-'+pid+'"></canvas></div></div>'+
      '<div><div class="mm-lbl">CTR</div><div class="chart-box xs"><canvas id="ov-ctr-'+pid+'"></canvas></div></div>'+
      '<div><div class="mm-lbl">CVR(UV)</div><div class="chart-box xs"><canvas id="ov-cvr-'+pid+'"></canvas></div></div>'+
      '<div><div class="mm-lbl">SRP 스코어</div><div class="chart-box xs"><canvas id="ov-srp-'+pid+'"></canvas></div></div>'+
    '</div></div>';}).join('')+
    '<div class="note">겹침 방지 위해 상품별 개별 4지표 추세. 상호 비교는 위 관제탑 표. CTR=PDP/노출, CVR=구매UV/PDP UV, SRP스코어=셀링스코어(0~1).</div></div>';
  return '<div class="insight">'+insight+'</div>'+
  '<div class="card"><h3>'+(S.div==='living'?'🛋️ 리빙':'🛏️ 가구')+' 자사 상품 관제탑 <span style="font-weight:400;color:var(--text3);font-size:12px">· 최근 7일</span></h3>'+
  '<table><thead><tr><th>상품</th><th class="num">어제 GMV</th><th class="num">7일 GMV</th><th class="num">WoW</th><th class="num">CTR</th><th class="num">CVR(UV)</th><th class="num">SRP 평균순위</th><th class="num">실객단가</th></tr></thead>'+
  '<tbody>'+rows+'</tbody></table>'+
  '<div class="note">CTR=PDP/노출, CVR(UV)=구매UV/PDP UV. WoW=최근7일 vs 이전7일 GMV. <b>SRP 평균순위=검색 노출키워드 노출가중 평균순위</b>(대표값, 최근14일). 괄호 "최고"=상위5%(P5) 노출순위(단발 1위 요행 제외). 실객단가=매트리스만(커버제외 가중), 그외 표시가.</div></div>'+trend;
}

function viewRadar(){
  const RD=D.keywordRadar;
  if(!RD||!RD.data) return '<div class="ph">경쟁 레이더 데이터 없음 (다음 데일리 갱신 시 생성).</div>';
  const FKW=['매트리스','침대프레임','수납침대'], LKW=['이불','차렵이불','냉감이불'];
  const kws=(S.div==='living'?LKW:FKW).filter(function(k){return RD.data[k];});
  const sm=RD.summary||{};
  function badge(x){
    if(x.is_self) return '<span class="pill self">우리</span>';
    var b='';
    if(x.tags.indexOf('boost_suspect')>=0) b+='<span class="pill" style="background:#FDECEA;color:#C0392B;border:1px solid #E74C3C">⚠️ 부스트의심</span> ';
    if(x.tags.indexOf('new_entrant')>=0) b+='<span class="pill" style="background:#FFF6E5;color:#B9770E">🆕 신규</span> ';
    if(x.tags.indexOf('known_comp')>=0) b+='<span class="pill" style="background:#eef0f4;color:#666">경쟁사</span> ';
    return b||'<span style="color:var(--text3)">-</span>';
  }
  var head='<div class="insight">🚨 <b>경쟁 레이더</b> — 핵심 키워드에서 <b>신규 진입자 · 프로모/광고로 순위만 산 상품</b>을 자동 감지. 지정경쟁사만 보던 사각지대를 보완. <span class="wbadge">'+(RD.window||'')+'</span></div>';
  head+='<div class="card" style="border-left:4px solid #E74C3C"><h3>🚨 이번주 위협 요약</h3><div style="display:flex;gap:24px;flex-wrap:wrap;align-items:flex-end">'+
    '<div class="kpi"><div class="lbl">🆕 신규 진입</div><div class="val">'+(sm.new_threats||0)+'</div><div class="sub">전 키워드 상위20 (리뷰<300)</div></div>'+
    '<div class="kpi"><div class="lbl">⚠️ 부스트/광고 의심</div><div class="val" style="color:#C0392B">'+(sm.boost_suspect||0)+'</div><div class="sub">순위↑ but 판매·리뷰 바닥</div></div>'+
    '</div><div class="note">'+(RD.note||'')+'</div></div>';
  var body=kws.map(function(kw){

}
function seriesPids(pid){ const c=compsOf(pid); if(c.length) return [pid].concat(c); if(meta(pid).vs && D.products[String(meta(pid).vs)]) return [pid,String(meta(pid).vs)]; return [pid]; }
function detailPids(div){ const self=selfPids(div); const comps=Object.keys(D.products).filter(function(k){ return meta(k).role==='competitor' && divOf(k)===div; }); return self.concat(comps); }
function buildDetailCharts(){
  if(S.sub==='metrics') buildMetricCharts();
  else if(S.sub==='srp') buildSrpCharts();
  else if(S.sub==='inflow') buildInflowChart();
  else if(S.sub==='age') buildAgeChart();
  else if(S.sub==='bench') buildBenchCharts();
}
function miniChart(id,labels,data,color,opts){ opts=opts||{}; const el=document.getElementById(id); if(!el||!labels.length) return;
  const yconf=Object.assign({ticks:{maxTicksLimit:4,font:{size:9},callback:function(v){return opts.pctY?v+'%':(Math.abs(v)>=1e8?(v/1e8).toFixed(1)+'억':Math.abs(v)>=1e4?Math.round(v/1e4)+'만':v);}}}, opts.yMin!=null?{min:opts.yMin,max:opts.yMax}:{beginAtZero:true});
  charts[id]=new Chart(el,{type:'line',data:{labels:labels,datasets:[{data:data,borderColor:color,backgroundColor:opts.fill===false?'transparent':color+'18',borderWidth:2.2,pointRadius:0,fill:opts.fill!==false,tension:.3,spanGaps:true}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{maxTicksLimit:5,font:{size:9}}},y:yconf}}});
}
function buildOverviewCharts(){
  selfPids(S.div).forEach(function(pid){ const dd=daily(pid); if(!dd.length) return;
    const lb=dd.map(function(r){return r.dt;});
    miniChart('ov-gmv-'+pid,lb,dd.map(function(r){return r.gmv;}),COL.self,{fill:false});
    miniChart('ov-ctr-'+pid,lb,dd.map(function(r){return r.imp?+(r.pdp/r.imp*100).toFixed(2):null;}),COL.self,{pctY:true,fill:false});
    miniChart('ov-cvr-'+pid,lb,dd.map(function(r){return r.pdp_uv?+(r.buy_uv/r.pdp_uv*100).toFixed(2):null;}),COL.self,{pctY:true,fill:false});
    const sd=(D.scoreTs&&D.scoreTs[pid])||[]; miniChart('ov-srp-'+pid,sd.map(function(r){return r.dt;}),sd.map(function(r){return r.score;}),COL.self,{fill:false,yMin:0,yMax:1});
  });
}
function mkBar(id,labels,data,colors,pctY){ const el=document.getElementById(id); if(!el) return;
  charts[id]=new Chart(el,{type:'bar',data:{labels:labels,datasets:[{data:data,backgroundColor:colors}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{font:{size:10},callback:function(v){return pctY?v+'%':v;}}},x:{ticks:{font:{size:11}}}}}});
}
function buildBenchCharts(){
  const key=benchKey(S.pid); const b=(D.benchmarks&&D.benchmarks[key])||null; if(!b) return;
  const self=(b.self_products||[]).find(function(x){return String(x.pid)===String(S.pid);}); const ca=b.cate_3p_avg||{};
  if(self){ const band=(b.price_bands||[]).find(function(x){return x.band===self.price_band;})||{};
    mkBar('ch-bench-ctr',['우리 PB','동일밴드 3P','카테 3P'],[self.ctr,band.p3_ctr,ca.ctr],[COL.self,COL.gray,COL.blue],true);
    mkBar('ch-bench-cvr',['우리 PB','동일밴드 3P','카테 3P'],[self.cvr,band.p3_cvr,ca.cvr],[COL.green,COL.gray,COL.blue],true);
  }
  const bands=b.price_bands||[]; const el=document.getElementById('ch-bench-band');
  if(bands.length&&el){ charts['ch-bench-band']=new Chart(el,{type:'bar',data:{labels:bands.map(function(x){return x.label;}),datasets:[
    {label:'PB CTR',data:bands.map(function(x){return x.pb_ctr;}),backgroundColor:COL.self},
    {label:'3P CTR',data:bands.map(function(x){return x.p3_ctr;}),backgroundColor:'#c7cad6'},
    {label:'PB CVR',data:bands.map(function(x){return x.pb_cvr;}),backgroundColor:COL.green},
    {label:'3P CVR',data:bands.map(function(x){return x.p3_cvr;}),backgroundColor:'#9aa0b0'}
  ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{boxWidth:10,font:{size:10}}}},scales:{x:{ticks:{font:{size:9}}},y:{beginAtZero:true,ticks:{font:{size:9},callback:function(v){return v+'%';}}}}}});
  }
}
function buildMetricCharts(){
  const dd=daily(S.pid); LB=dd.map(function(r){return r.dt;});
  const pids=seriesPids(S.pid);
  lineChart('ch-gmv',LB,pids.map(function(p,i){return dsFor(p,'gmv',i);}));
  lineChart('ch-qty',LB,[dsFor(S.pid,'qty',0)]);
  lineChart('ch-ctr',LB,pids.map(function(p,i){return dsFor(p,null,i,function(r){return r.imp?+(r.pdp/r.imp*100).toFixed(2):null;});}),true);
  lineChart('ch-cvr',LB,pids.map(function(p,i){return dsFor(p,null,i,function(r){return r.pdp_uv?+(r.buy_uv/r.pdp_uv*100).toFixed(2):null;});}),true);
}
function buildSrpCharts(){
  const pids=seriesPids(S.pid);
  const sd=(D.scoreTs&&D.scoreTs[S.pid])||[];
  if(sd.length){ const lb=sd.map(function(r){return r.dt;});
    const ds=pids.map(function(p,i){ const arr=(D.scoreTs&&D.scoreTs[p])||[]; const m={}; arr.forEach(function(r){m[r.dt]=r.score;}); const st=serStyle(i); return {label:sn(p),data:lb.map(function(d){return m[d]!=null?m[d]:null;}),borderColor:st.borderColor,backgroundColor:'transparent',borderWidth:st.borderWidth,borderDash:st.borderDash,pointRadius:0,tension:.25,spanGaps:true};});
    lineChart('ch-score',lb,ds);
  }
  const fd=(D.srpFeatureTs&&D.srpFeatureTs[S.pid])||[];
  if(fd.length){ const lb=fd.map(function(r){return r.dt;});
    const feats=[['review',false],['sell28',false],['view28',false],['spv28',false],['wish',false],['card',false],['qc_rank',true]];
    feats.forEach(function(f){ const key=f[0], isRank=f[1];
      const el=document.getElementById('ch-feat-'+key); if(!el) return;
      const ds=pids.map(function(p,i){ const arr=(D.srpFeatureTs&&D.srpFeatureTs[p])||[]; const m={}; arr.forEach(function(r){m[r.dt]=r[key];}); const st=serStyle(i); return {label:sn(p),data:lb.map(function(d){return m[d]!=null?m[d]:null;}),borderColor:st.borderColor,backgroundColor:'transparent',borderWidth:st.borderWidth,borderDash:st.borderDash,pointRadius:0,tension:.25,spanGaps:true};});
      charts['ch-feat-'+key]=new Chart(el,{type:'line',data:{labels:lb,datasets:ds},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:pids.length>1,labels:{boxWidth:10,font:{size:9}}}},scales:{x:{ticks:{maxTicksLimit:4,font:{size:9}}},y:(isRank?{ticks:{maxTicksLimit:4,font:{size:9}}}:{min:0,max:1,ticks:{maxTicksLimit:3,font:{size:9}}})}}});
    });
  }
}
function channelMix(pid){ const m={}; (D.inflow||[]).forEach(function(r){ if(String(r.pid)===String(pid)) m[r.inflow]=(m[r.inflow]||0)+(r.imp||0); }); return m; }
function buildInflowChart(){
  const rows=(D.inflow||[]).filter(function(r){return String(r.pid)===String(S.pid);});
  if(rows.length){
    const dates=Array.from(new Set(rows.map(function(r){return r.dt;}))).sort();
    const chans=Array.from(new Set(rows.map(function(r){return r.inflow;})));
    const ds=chans.map(function(ch,i){ const m={}; rows.filter(function(r){return r.inflow===ch;}).forEach(function(r){m[r.dt]=r.imp||0;}); return {label:ch,data:dates.map(function(d){return m[d]||0;}),backgroundColor:CHANNEL_COLORS[i%CHANNEL_COLORS.length]};});
    const el=document.getElementById('ch-inflow'); if(el) charts['ch-inflow']=new Chart(el,{type:'bar',data:{labels:dates,datasets:ds},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{boxWidth:10,font:{size:10}}}},scales:{x:{stacked:true,ticks:{maxTicksLimit:14,font:{size:9}}},y:{stacked:true,ticks:{font:{size:10}}}}}});
  }
  const ents=seriesPids(S.pid);
  if(ents.length>1){
    const mixes=ents.map(channelMix);
    const chans=Array.from(new Set([].concat.apply([],mixes.map(function(m){return Object.keys(m);}))));
    chans.sort(function(a,b){ return mixes.reduce(function(s,m){return s+(m[b]||0);},0)-mixes.reduce(function(s,m){return s+(m[a]||0);},0); });
    const totals=mixes.map(function(m){ return Object.keys(m).reduce(function(s,k){return s+m[k];},0)||1; });
    // ① 절대 노출 — 채널 x축, 엔티티(우리 vs 경쟁)별 grouped bar
    const elA=document.getElementById('ch-inflow-cmp-abs');
    if(elA){ const dsA=ents.map(function(p,j){ return {label:(meta(p).role==='competitor'?'⚔️ ':'⭐ ')+sn(p),data:chans.map(function(ch){return mixes[j][ch]||0;}),backgroundColor:serColor(j)}; });
      charts['ch-inflow-cmp-abs']=new Chart(elA,{type:'bar',data:{labels:chans,datasets:dsA},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{boxWidth:12,font:{size:11}}}},scales:{x:{ticks:{font:{size:10}}},y:{beginAtZero:true,ticks:{font:{size:10},callback:function(v){return Math.abs(v)>=1e4?Math.round(v/1e4)+'만':v;}}}}}});
    }
    // ② 비중 — 엔티티별 100% 스택
    const el2=document.getElementById('ch-inflow-cmp');
    if(el2){ const ds=chans.map(function(ch,i){ return {label:ch,data:mixes.map(function(m,j){return +((m[ch]||0)/totals[j]*100).toFixed(1);}),backgroundColor:CHANNEL_COLORS[i%CHANNEL_COLORS.length]}; });
      charts['ch-inflow-cmp']=new Chart(el2,{type:'bar',data:{labels:ents.map(function(p){return (meta(p).role==='competitor'?'⚔️ ':'⭐ ')+sn(p);}),datasets:ds},
        options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{boxWidth:10,font:{size:10}}},tooltip:{callbacks:{label:function(c){return c.dataset.label+': '+c.parsed.x+'%';}}}},scales:{x:{stacked:true,max:100,ticks:{font:{size:9},callback:function(v){return v+'%';}}},y:{stacked:true,ticks:{font:{size:11}}}}}});
    }
  }
}
function buildAgeChart(){
  const e=((D.ages&&D.ages.buyer)||[]).find(function(x){return String(x.pid)===String(S.pid)||String(x.product||'').indexOf(S.pid)>=0;});
  if(!e||!e.age) return; const el=document.getElementById('ch-age'); if(!el) return;
  const ks=Object.keys(e.age);
  charts['ch-age']=new Chart(el,{type:'bar',data:{labels:ks,datasets:[{label:'비중 %',data:ks.map(function(k){return e.age[k];}),backgroundColor:COL.self}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{font:{size:10},callback:function(v){return v+'%';}}},x:{ticks:{font:{size:10}}}}}});
}
function buildMpriceCharts(){
  const mats=selfPids('furniture').filter(function(p){return meta(p).group==='매트리스';});
  mats.forEach(function(pid){ const dc=((M.decomp&&M.decomp[pid])||[]).slice().sort(function(a,b){return (b.gmv||0)-(a.gmv||0);}); const el=document.getElementById('mp-'+pid); if(!el||!dc.length) return;
    charts['mp-'+pid]=new Chart(el,{type:'bar',data:{labels:dc.map(function(r){return (r.hardness||'')+' '+(r.size||'');}),datasets:[{label:'객단가',data:dc.map(function(r){return r.unit;}),backgroundColor:COL.self,yAxisID:'y'},{label:'수량',data:dc.map(function(r){return r.qty;}),backgroundColor:COL.c1,type:'line',borderColor:COL.c1,yAxisID:'y1',pointRadius:2}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{boxWidth:10,font:{size:10}}}},scales:{x:{ticks:{font:{size:9},maxRotation:60}},y:{position:'left',ticks:{font:{size:9},callback:function(v){return Math.round(v/1e4)+'만';}}},y1:{position:'right',grid:{display:false},ticks:{font:{size:9}}}}}});
  });
}
function buildAttachCharts(){
  const afo=(M&&M.attach_frame_option)||[]; const el=document.getElementById('at-afo'); if(!el||!afo.length) return;
  charts['at-afo']=new Chart(el,{type:'bar',data:{labels:afo.map(function(r){return r.yyyymm;}),datasets:[{label:'GMV',data:afo.map(function(r){return r.gmv;}),backgroundColor:COL.self,yAxisID:'y'},{label:'수량',data:afo.map(function(r){return r.qty;}),type:'line',borderColor:COL.c1,pointRadius:3,yAxisID:'y1'}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{boxWidth:10,font:{size:10}}}},scales:{y:{position:'left',ticks:{font:{size:9},callback:function(v){return Math.round(v/1e4)+'만';}}},y1:{position:'right',grid:{display:false},beginAtZero:true,ticks:{font:{size:9}}}}}});
}

Promise.all([
  fetch('tf-data.json').then(function(r){return r.json();}),
  fetch('tf-mattress-data.json').then(function(r){return r.json();}).catch(function(){return null;})
]).then(function(res){ D=res[0]; M=res[1]; try{ if(sessionStorage.getItem('startDiv')==='furniture'){ S.div='furniture'; sessionStorage.removeItem('startDiv'); } }catch(e){} render(); })
.catch(function(e){ document.getElementById('content').innerHTML='<div class="ph">데이터 로드 실패: '+e.message+'</div>'; });
</script>
