<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>숏헤드 PB 대시보드 · 리빙/가구</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet">
<style>
:root{--bg:#f5f6f8;--card:#fff;--border:#e2e4ea;--text:#1a1d27;--text2:#6b6e7d;--text3:#9a9dad;--accent:#6c5ce7;--green:#00b894;--red:#ff6b6b;--orange:#e6a817;--blue:#3b82f6;--purple:#8b5cf6}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Pretendard',sans-serif;font-size:15px;line-height:1.5}
.top-bar{position:sticky;top:0;z-index:100;background:rgba(255,255,255,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:10px 28px;display:flex;align-items:center;justify-content:space-between;height:56px}
.top-bar .logo{font-weight:800;font-size:16px}
.top-bar .logo .mission{color:var(--text2);font-weight:500;font-size:13px;margin-left:8px}
.top-bar .meta{font-size:13px;color:var(--text2)}
.top-bar .v-badge{background:var(--accent);color:#fff;padding:2px 8px;border-radius:4px;font-size:12px;font-weight:700}
.div-nav{display:flex;gap:8px;background:var(--card);border-bottom:1px solid var(--border);padding:10px 28px;position:sticky;top:56px;z-index:99}
.div-btn{padding:8px 20px;font-size:15px;font-weight:700;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text2);cursor:pointer;font-family:inherit}
.div-btn.active{background:var(--text);color:#fff;border-color:var(--text)}
.view-nav{display:flex;background:var(--card);border-bottom:1px solid var(--border);padding:0 28px;overflow-x:auto}
.view-btn{padding:11px 16px;font-size:14px;font-weight:600;color:var(--text2);background:none;border:none;cursor:pointer;position:relative;white-space:nowrap;font-family:inherit}
.view-btn:hover{color:var(--text)}
.view-btn.active{color:var(--accent)}
.view-btn.active::after{content:'';position:absolute;bottom:0;left:8px;right:8px;height:2px;background:var(--accent);border-radius:1px}
.wrap{max-width:1180px;margin:0 auto;padding:20px 28px 60px}
.selector{margin:6px 0 18px}
.sel-group{margin-bottom:10px}
.sel-group .glabel{font-size:12px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px}
.sel-group .glabel .strat{padding:1px 7px;border-radius:4px;font-size:11px;margin-left:4px}
.strat.internal{background:rgba(59,130,246,.12);color:var(--blue)}
.strat.external{background:rgba(230,168,23,.14);color:var(--orange)}
.pills{display:flex;flex-wrap:wrap;gap:8px}
.pill-btn{padding:7px 14px;border-radius:20px;border:1px solid var(--border);background:var(--card);color:var(--text2);cursor:pointer;font-family:inherit;font-size:14px;font-weight:600}
.pill-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.subtabs{display:flex;gap:4px;border-bottom:1px solid var(--border);margin-bottom:16px;overflow-x:auto}
.subtab{padding:9px 15px;font-size:13.5px;font-weight:600;color:var(--text2);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;font-family:inherit;white-space:nowrap}
.subtab.active{color:var(--accent);border-bottom-color:var(--accent)}
.grid{display:grid;gap:14px}
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:16px}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 16px;border-left:3px solid var(--accent)}
.kpi .lbl{font-size:12px;color:var(--text2);text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px;font-weight:600}
.kpi .val{font-size:22px;font-weight:800}
.kpi .val small{font-size:13px;color:var(--text2);font-weight:600}
.kpi .sub{font-size:12px;color:var(--text3);margin-top:3px}
.chg.up{color:var(--green);font-weight:700}
.chg.dn{color:var(--red);font-weight:700}
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;box-shadow:0 1px 2px rgba(0,0,0,.03);margin-bottom:16px}
.card h3{font-size:15px;font-weight:700;margin-bottom:12px}
.card .note{font-size:12px;color:var(--text3);margin-top:8px;font-style:italic}
.chart-box{position:relative;height:300px}
.chart-box.sm{height:240px}
table{width:100%;border-collapse:collapse;font-size:13.5px}
th{text-align:left;padding:9px 6px;border-bottom:1px solid var(--border);color:var(--text2);font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.3px}
td{padding:9px 6px;border-bottom:1px solid #f0f1f5}
tr:hover td{background:rgba(108,92,231,.04)}
td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
.self-row{background:rgba(108,92,231,.05);font-weight:700}
.pill{display:inline-block;padding:1px 8px;border-radius:10px;font-size:12px;font-weight:600}
.pill.self{background:rgba(108,92,231,.12);color:var(--accent)}
.pill.comp{background:rgba(154,157,173,.14);color:var(--text2)}
.pill.warn{background:rgba(230,168,23,.16);color:var(--orange)}
.pill.good{background:rgba(0,184,148,.14);color:var(--green)}
.insight{background:linear-gradient(135deg,rgba(108,92,231,.06),rgba(162,155,254,.04));border-left:3px solid var(--accent);padding:12px 14px;border-radius:6px;margin:0 0 16px;font-size:14px;line-height:1.6}
.ph{padding:40px;text-align:center;color:var(--text3);font-size:14px;background:var(--card);border:1px dashed var(--border);border-radius:10px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:760px){.grid2{grid-template-columns:1fr}}
.prod-head{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.prod-head .nm{font-size:19px;font-weight:800}
.prod-head .pidt{font-size:12px;color:var(--text3);margin-left:auto}
</style>
</head>
<body>
<div class="top-bar">
  <div class="logo">🏠 숏헤드 PB 대시보드<span class="mission">리빙 · 가구 통합 모니터링</span></div>
  <div class="meta"><span class="v-badge" id="v-badge">v19</span> <span id="upd"></span></div>
</div>
<div class="div-nav" id="div-nav"></div>
<div class="view-nav" id="view-nav"></div>
<div class="wrap" id="content"></div>

<script>
let D=null, M=null;
const S={div:'living', view:'overview', pid:null, sub:'metrics'};
const charts={};
let LB=[];
const COL={self:'#6c5ce7', c1:'#e6a817', c2:'#8b5cf6', green:'#00b894', red:'#ff6b6b', blue:'#3b82f6', gray:'#b0b3c0'};
const CHANNEL_COLORS=['#6c5ce7','#00b894','#e6a817','#3b82f6','#ff6b6b','#8b5cf6','#00cec9','#fab1a0','#74b9ff','#a29bfe','#55efc4','#ffeaa7','#fd79a8','#636e72','#dfe6e9'];

function destroyCharts(){ Object.values(charts).forEach(c=>{try{c.destroy();}catch(e){}}); for(const k in charts) delete charts[k]; }
function won(n){ if(n==null||isNaN(n)) return '-'; const a=Math.abs(n); if(a>=1e8) return (n/1e8).toFixed(1)+'억'; if(a>=1e4) return Math.round(n/1e4).toLocaleString()+'만'; return Math.round(n).toLocaleString(); }
function pct(n,d){ return (n==null||isNaN(n))?'-':n.toFixed(d==null?2:d)+'%'; }
function meta(pid){ return (D.products&&D.products[pid])||{}; }
function sn(pid){ return meta(pid).shortName||pid; }
function selfPids(div){ return ((D.meta.divisions&&D.meta.divisions[div])||[]).filter(p=>meta(p).role==='self'); }
function compsOf(pid){ return Object.keys(D.products).filter(k=>String(meta(k).vs)===String(pid)); }
function divOf(pid){ const m=meta(pid); if(m.div) return m.div; if(m.vs) return meta(m.vs).div||'living'; return 'living'; }
function benchKey(pid){ if(divOf(pid)==='living') return 'bedding'; return meta(pid).group==='매트리스'?'mattress':'bed'; }
function daily(pid){ return (D.daily&&D.daily[pid])||[]; }
function sumF(arr,f,n,skip){ skip=skip||0; const s=arr.slice(Math.max(0,arr.length-n-skip), arr.length-skip); return s.reduce((a,r)=>a+(r[f]||0),0); }
function unitPrice(pid){ if(M&&M.decomp&&M.decomp[pid]){ const dc=M.decomp[pid]; const g=dc.reduce((a,r)=>a+(r.gmv||0),0), q=dc.reduce((a,r)=>a+(r.qty||0),0); return q?Math.round(g/q):null; } return null; }
function srpBest(pid){ const rows=(D.srpMatrix||[]).filter(r=>String(r.pid)===String(pid)); if(!rows.length) return null; return Math.min.apply(null, rows.map(r=>r.best)); }

function renderNav(){
  document.getElementById('v-badge').textContent = D.meta.version||'v19';
  document.getElementById('upd').textContent = '기준 '+(D.meta.lastUpdate||'');
  document.getElementById('div-nav').innerHTML=[['living','🛋️ 리빙'],['furniture','🛏️ 가구']].map(function(a){return '<button class="div-btn '+(S.div===a[0]?'active':'')+'" onclick="setDiv(\''+a[0]+'\')">'+a[1]+'</button>';}).join('');
  const views = S.div==='living' ? [['overview','📊 Overview'],['detail','🔎 상품 상세']]
    : [['overview','📊 Overview'],['detail','🔎 상품 상세'],['mprice','📐 매트리스 객단가'],['attach','🔗 프레임 합구매']];
  document.getElementById('view-nav').innerHTML = views.map(function(a){return '<button class="view-btn '+(S.view===a[0]?'active':'')+'" onclick="setView(\''+a[0]+'\')">'+a[1]+'</button>';}).join('');
}
function setDiv(d){ S.div=d; S.view='overview'; S.pid=null; render(); }
function setView(v){ S.view=v; if(v==='detail'&&!S.pid){ S.pid=selfPids(S.div)[0]; } render(); }
function setPid(p){ S.pid=p; S.sub='metrics'; render(); }
function setSub(s){ S.sub=s; render(); }

function render(){
  destroyCharts(); renderNav();
  const c=document.getElementById('content');
  try{
    if(S.view==='overview') c.innerHTML=viewOverview();
    else if(S.view==='detail'){ c.innerHTML=viewDetail(); buildDetailCharts(); }
    else if(S.view==='mprice'){ c.innerHTML=viewMprice(); buildMpriceCharts(); }
    else if(S.view==='attach'){ c.innerHTML=viewAttach(); buildAttachCharts(); }
  }catch(e){ c.innerHTML='<div class="ph">렌더 오류: '+e.message+'</div>'; console.error(e); }
}

function viewOverview(){
  const sp=selfPids(S.div);
  const rows=sp.map(function(pid){
    const dd=daily(pid); const last=dd[dd.length-1]||{};
    const r7=sumF(dd,'gmv',7), p7=sumF(dd,'gmv',7,7); const wow=p7? (r7-p7)/p7*100 : null;
    const imp=sumF(dd,'imp',7), pdp=sumF(dd,'pdp',7), pu=sumF(dd,'pdp_uv',7), bu=sumF(dd,'buy_uv',7);
    const ctr=imp? pdp/imp*100:null, cvr=pu? bu/pu*100:null;
    const up=unitPrice(pid); const best=srpBest(pid); const m=meta(pid);
    return '<tr>'+
      '<td>'+(m.emoji||'')+' <b>'+sn(pid)+'</b> <span class="pill '+(m.strategy==='internal'?'self':'warn')+'">'+(m.strategy==='internal'?'내부/SRP':'외부')+'</span><div style="font-size:11px;color:var(--text3)">'+(m.group||'')+' · '+pid+'</div></td>'+
      '<td class="num">'+won(last.gmv)+'</td>'+
      '<td class="num">'+won(r7)+'</td>'+
      '<td class="num '+(wow==null?'':wow>=0?'chg up':'chg dn')+'">'+(wow==null?'-':(wow>=0?'+':'')+wow.toFixed(0)+'%')+'</td>'+
      '<td class="num">'+pct(ctr)+'</td>'+
      '<td class="num">'+pct(cvr)+'</td>'+
      '<td class="num">'+(best==null?'-':best+'위')+'</td>'+
      '<td class="num">'+(up?won(up):(m.price?won(m.price)+' <span style="color:var(--text3);font-size:11px">(표시가)</span>':'-'))+'</td>'+
    '</tr>';
  }).join('');
  const insight = S.div==='living'
    ? '리빙 자사 침구 3종. 60수·소프트워싱 = 인앱 SRP 전략, 알러지케어 = 외부 확장. 최근 7일 기준 관제.'
    : '가구 자사 6종. 매트리스3 = 인앱 SRP, 침대프레임3 = 외부 전략. <b>실객단가는 표시가와 크게 다름</b>(사이즈·경도). 상세·객단가·합구매 탭 참조.';
  return '<div class="insight">'+insight+'</div>'+
  '<div class="card"><h3>'+(S.div==='living'?'🛋️ 리빙':'🛏️ 가구')+' 자사 상품 관제탑 <span style="font-weight:400;color:var(--text3);font-size:12px">· 최근 7일</span></h3>'+
  '<table><thead><tr><th>상품</th><th class="num">어제 GMV</th><th class="num">7일 GMV</th><th class="num">WoW</th><th class="num">CTR</th><th class="num">CVR(UV)</th><th class="num">SRP최고</th><th class="num">실객단가</th></tr></thead>'+
  '<tbody>'+rows+'</tbody></table>'+
  '<div class="note">CTR=PDP/노출, CVR(UV)=구매UV/PDP UV. WoW=최근7일 vs 이전7일 GMV. SRP최고=검색 노출키워드 최고순위. 실객단가=매트리스만(커버제외 가중), 그외 표시가.</div></div>';
}

function viewDetail(){
  const sp=selfPids(S.div); if(!S.pid) S.pid=sp[0];
  const groups={}; sp.forEach(function(pid){ const g=meta(pid).strategy||'etc'; (groups[g]=groups[g]||[]).push(pid); });
  const order=['internal','external','etc']; const gl={internal:'인앱 SRP 전략', external:'외부 전략', etc:'기타'};
  let selector='<div class="selector">';
  order.forEach(function(g){ if(!groups[g]) return;
    selector+='<div class="sel-group"><div class="glabel">'+gl[g]+'<span class="strat '+g+'">'+(g==='internal'?'내부':g==='external'?'외부':'')+'</span></div><div class="pills">'+
      groups[g].map(function(pid){return '<button class="pill-btn '+(S.pid===pid?'active':'')+'" onclick="setPid(\''+pid+'\')">'+(meta(pid).emoji||'')+' '+sn(pid)+'</button>';}).join('')+'</div></div>';
  });
  selector+='</div>';
  const subs=[['metrics','지표 종합'],['srp','SRP'],['inflow','유입'],['age','연령대'],['bench','벤치마크']];
  const subnav='<div class="subtabs">'+subs.map(function(a){return '<button class="subtab '+(S.sub===a[0]?'active':'')+'" onclick="setSub(\''+a[0]+'\')">'+a[1]+'</button>';}).join('')+'</div>';
  const m=meta(S.pid);
  const head='<div class="prod-head"><span style="font-size:26px">'+(m.emoji||'📦')+'</span><span class="nm">'+(m.name||sn(S.pid))+'</span><span class="pidt">'+(m.brand||'')+' · '+won(m.price)+(m.priceNote?' · '+m.priceNote:'')+' · '+S.pid+'</span></div>';
  let body='';
  if(S.sub==='metrics') body=subMetrics(S.pid);
  else if(S.sub==='srp') body=subSrp(S.pid);
  else if(S.sub==='inflow') body=subInflow(S.pid);
  else if(S.sub==='age') body=subAge(S.pid);
  else if(S.sub==='bench') body=subBench(S.pid);
  return selector+head+subnav+'<div id="subbody">'+body+'</div>';
}

function subMetrics(pid){
  const dd=daily(pid); if(!dd.length) return '<div class="ph">일별 데이터 없음</div>';
  const last=dd[dd.length-1]||{};
  const r7g=sumF(dd,'gmv',7), p7g=sumF(dd,'gmv',7,7), wow=p7g?(r7g-p7g)/p7g*100:null;
  const imp=sumF(dd,'imp',7),pdp=sumF(dd,'pdp',7),pu=sumF(dd,'pdp_uv',7),bu=sumF(dd,'buy_uv',7);
  const comps=compsOf(pid);
  const kpis='<div class="kpi-row">'+
    '<div class="kpi"><div class="lbl">어제 GMV</div><div class="val">'+won(last.gmv)+'</div><div class="sub">'+(last.dt||'')+'</div></div>'+
    '<div class="kpi"><div class="lbl">7일 GMV</div><div class="val">'+won(r7g)+'</div><div class="sub '+(wow==null?'':wow>=0?'chg up':'chg dn')+'">'+(wow==null?'':'WoW '+(wow>=0?'+':'')+wow.toFixed(0)+'%')+'</div></div>'+
    '<div class="kpi"><div class="lbl">CTR (7일)</div><div class="val">'+pct(imp?pdp/imp*100:null)+'</div><div class="sub">PDP/노출</div></div>'+
    '<div class="kpi"><div class="lbl">CVR-UV (7일)</div><div class="val">'+pct(pu?bu/pu*100:null)+'</div><div class="sub">구매UV/PDP UV</div></div>'+
    (unitPrice(pid)?'<div class="kpi"><div class="lbl">실객단가</div><div class="val">'+won(unitPrice(pid))+'</div><div class="sub">커버제외 가중</div></div>':'')+
  '</div>';
  const vsNote = comps.length? '<div class="note">vs 경쟁: '+comps.map(function(c){return sn(c);}).join(', ')+'</div>':'<div class="note">외부 전략 상품 — 인앱 경쟁 미지정</div>';
  return kpis+'<div class="grid2">'+
    '<div class="card"><h3>📊 일별 GMV '+(comps.length?'· vs 경쟁':'')+'</h3><div class="chart-box"><canvas id="ch-gmv"></canvas></div>'+vsNote+'</div>'+
    '<div class="card"><h3>📦 일별 판매수량</h3><div class="chart-box"><canvas id="ch-qty"></canvas></div></div>'+
    '<div class="card"><h3>📈 일별 CTR '+(comps.length?'· vs 경쟁':'')+'</h3><div class="chart-box sm"><canvas id="ch-ctr"></canvas></div></div>'+
    '<div class="card"><h3>📈 일별 CVR(UV) '+(comps.length?'· vs 경쟁':'')+'</h3><div class="chart-box sm"><canvas id="ch-cvr"></canvas></div></div>'+
  '</div>'+
  '<div class="card"><h3>🧭 액션 타임라인</h3>'+actionTable(pid)+'</div>';
}
function actionTable(pid){
  const acts=(D.actions||[]).filter(function(a){return String(a.product)===String(pid);});
  if(!acts.length) return '<div class="note">기록된 액션 없음</div>';
  return '<table><thead><tr><th>일자</th><th>액션</th><th>유형</th></tr></thead><tbody>'+
    acts.map(function(a){return '<tr><td>'+a.date+'</td><td>'+a.action+'</td><td><span class="pill comp">'+a.type+'</span></td></tr>';}).join('')+'</tbody></table>';
}

function subSrp(pid){
  const hasScore=D.scoreTs&&D.scoreTs[pid]&&D.scoreTs[pid].length;
  const hasFeat=D.srpFeatureTs&&D.srpFeatureTs[pid]&&D.srpFeatureTs[pid].length;
  const kws=(D.srpKeywords&&D.srpKeywords[pid])||[];
  const mtx=(D.srpMatrix||[]).filter(function(r){return String(r.pid)===String(pid);});
  if(!hasScore&&!hasFeat&&!kws.length&&!mtx.length) return '<div class="ph">SRP 데이터 없음 (경쟁상품은 키워드 미수집)</div>';
  let h='<div class="grid2">';
  h+='<div class="card"><h3>🎯 셀링스코어 추이 '+(compsOf(pid).length?'· vs 경쟁':'')+'</h3>'+(hasScore?'<div class="chart-box sm"><canvas id="ch-score"></canvas></div>':'<div class="ph">score 없음</div>')+'</div>';
  h+='<div class="card"><h3>🧩 SRP 피처 추이</h3>'+(hasFeat?'<div class="chart-box sm"><canvas id="ch-feat"></canvas></div><div class="note">0~1 점수: 리뷰/판매28/뷰28/뷰당판매/찜/장바구니</div>':'<div class="ph">feat 없음</div>')+'</div>';
  h+='</div>';
  if(kws.length){
    const byKw={}; kws.forEach(function(k){ if(!byKw[k.kw]||k.dt>byKw[k.kw].dt) byKw[k.kw]=k; });
    const rows=Object.keys(byKw).map(function(k){return byKw[k];}).sort(function(a,b){return a.rank-b.rank;}).map(function(k){return '<tr><td>'+k.kw+'</td><td class="num">'+k.rank+'</td><td class="num">'+k.best+'</td><td class="num">'+k.score+'</td></tr>';}).join('');
    h+='<div class="card"><h3>🔍 검색 키워드 순위 <span style="font-weight:400;color:var(--text3);font-size:12px">· 최근 14일 평균</span></h3><table><thead><tr><th>키워드</th><th class="num">평균순위</th><th class="num">최고</th><th class="num">셀링스코어</th></tr></thead><tbody>'+rows+'</tbody></table></div>';
  }
  if(mtx.length){
    const rows=mtx.slice().sort(function(a,b){return a.rank-b.rank;}).map(function(r){return '<tr><td>'+r.kw+'</td><td class="num">'+r.rank+'</td><td class="num">'+r.best+'</td><td class="num">'+r.score+'</td><td class="num">'+pct(r.ctr)+'</td><td class="num">'+(r.imp||0).toLocaleString()+'</td></tr>';}).join('');
    h+='<div class="card"><h3>📋 SRP 매트릭스 <span style="font-weight:400;color:var(--text3);font-size:12px">· 최근 30일</span></h3><table><thead><tr><th>키워드</th><th class="num">순위</th><th class="num">최고</th><th class="num">스코어</th><th class="num">CTR</th><th class="num">노출</th></tr></thead><tbody>'+rows+'</tbody></table></div>';
  }
  return h;
}

function subInflow(pid){
  const rows=(D.inflow||[]).filter(function(r){return String(r.pid)===String(pid);});
  const cvr=(D.inflowCvr&&D.inflowCvr.data&&D.inflowCvr.data[pid])||null;
  if(!rows.length&&!cvr) return '<div class="ph">유입 데이터 없음</div>';
  let h='';
  if(rows.length) h+='<div class="card"><h3>🚀 유입 채널별 노출 <span style="font-weight:400;color:var(--text3);font-size:12px">· 최근 14일</span></h3><div class="chart-box"><canvas id="ch-inflow"></canvas></div><div class="note">일별 채널 노출(imp) 스택.</div></div>';
  if(rows.length){
    const dates=Array.from(new Set(rows.map(function(r){return r.dt;}))).sort();
    const recent=dates.slice(-7), prev=dates.slice(-14,-7);
    const ch={};
    rows.forEach(function(r){ ch[r.inflow]=ch[r.inflow]||{r:0,p:0}; if(recent.indexOf(r.dt)>=0) ch[r.inflow].r+=r.click_uv||0; else if(prev.indexOf(r.dt)>=0) ch[r.inflow].p+=r.click_uv||0; });
    const crows=Object.keys(ch).map(function(k){return [k,ch[k]];}).sort(function(a,b){return b[1].r-a[1].r;}).map(function(e){ const k=e[0],v=e[1]; const w=v.p?(v.r-v.p)/v.p*100:null; return '<tr><td>'+k+'</td><td class="num">'+v.r.toLocaleString()+'</td><td class="num">'+v.p.toLocaleString()+'</td><td class="num '+(w==null?'':w>=0?'chg up':'chg dn')+'">'+(w==null?'-':(w>=0?'+':'')+w.toFixed(0)+'%')+'</td></tr>'; }).join('');
    h+='<div class="card"><h3>🔀 채널 변화 (클릭 UV, 최근7일 vs 이전7일)</h3><table><thead><tr><th>채널</th><th class="num">최근7일</th><th class="num">이전7일</th><th class="num">WoW</th></tr></thead><tbody>'+crows+'</tbody></table></div>';
  }
  if(cvr){
    const crows=Object.keys(cvr).map(function(k){return [k,cvr[k]];}).sort(function(a,b){return (b[1].click_uv||0)-(a[1].click_uv||0);}).map(function(e){var k=e[0],v=e[1];return '<tr><td>'+k+'</td><td class="num">'+(v.click_uv||0).toLocaleString()+'</td><td class="num">'+(v.buy_uv||0).toLocaleString()+'</td><td class="num">'+pct(v.cvr)+'</td></tr>';}).join('');
    h+='<div class="card"><h3>💳 채널별 전환 <span style="font-weight:400;color:var(--text3);font-size:12px">· '+(D.inflowCvr.period||'7일')+'</span></h3><table><thead><tr><th>채널</th><th class="num">클릭 UV</th><th class="num">구매 UV</th><th class="num">CVR</th></tr></thead><tbody>'+crows+'</tbody></table></div>';
  }
  return h;
}

function subAge(pid){
  const e=((D.ages&&D.ages.buyer)||[]).find(function(x){return String(x.pid)===String(pid)||String(x.product||'').indexOf(pid)>=0;});
  if(!e||!e.age) return '<div class="ph">연령 데이터 없음</div>';
  const warn=e.warn?'<span class="pill warn">표본 적음 (n='+e.sample+')</span>':'<span class="pill good">n='+e.sample+'</span>';
  return '<div class="card"><h3>👥 구매자 연령대 분포 '+warn+'</h3><div class="chart-box sm"><canvas id="ch-age"></canvas></div><div class="note">2025.01~2026.07 구매자 중 생년월일 확인분. 25-34세 집중도가 핵심.</div></div>';
}

function subBench(pid){
  const key=benchKey(pid); const b=(D.benchmarks&&D.benchmarks[key])||null;
  if(!b) return '<div class="ph">벤치마크 데이터 없음</div>';
  const self=(b.self_products||[]).find(function(x){return String(x.pid)===String(pid);});
  const bands=b.price_bands||[]; const ca=b.cate_3p_avg||{};
  let h='<div class="insight">카테고리 <b>'+(key==='bedding'?'이불/이불커버':key==='mattress'?'매트리스':'침대')+'</b> · 자사 PB vs 3P 벤치마크 (최근 7일 UV)</div>';
  if(self){
    h+='<div class="kpi-row">'+
      '<div class="kpi"><div class="lbl">우리 CTR</div><div class="val">'+pct(self.ctr)+'</div><div class="sub">카테3P '+pct(ca.ctr)+(self.cate_ctr_ratio?' · '+self.cate_ctr_ratio.toFixed(2)+'x':'')+'</div></div>'+
      '<div class="kpi"><div class="lbl">우리 CVR</div><div class="val">'+pct(self.cvr)+'</div><div class="sub">카테3P '+pct(ca.cvr)+(self.cate_cvr_ratio?' · '+self.cate_cvr_ratio.toFixed(2)+'x':'')+'</div></div>'+
    '</div>';
  }
  const brows=bands.map(function(bd){return '<tr class="'+(self&&self.price_band===bd.band?'self-row':'')+'"><td>'+bd.label+'</td><td class="num">'+pct(bd.pb_ctr)+'</td><td class="num">'+pct(bd.p3_ctr)+'</td><td class="num">'+(bd.ctr_ratio?bd.ctr_ratio.toFixed(2)+'x':'-')+'</td><td class="num">'+pct(bd.pb_cvr)+'</td><td class="num">'+pct(bd.p3_cvr)+'</td><td class="num">'+(bd.cvr_ratio?bd.cvr_ratio.toFixed(2)+'x':'-')+'</td><td class="num">'+bd.pb_prod_cnt+'/'+bd.p3_prod_cnt+'</td></tr>';}).join('');
  h+='<div class="card"><h3>💰 가격대별 PB vs 3P</h3><table><thead><tr><th>가격대</th><th class="num">PB CTR</th><th class="num">3P CTR</th><th class="num">CTR비</th><th class="num">PB CVR</th><th class="num">3P CVR</th><th class="num">CVR비</th><th class="num">PB/3P수</th></tr></thead><tbody>'+brows+'</tbody></table></div>';
  const lineup=(b.pb_lineup||[]);
  if(lineup.length){
    const lrows=lineup.slice().sort(function(a,b){return (b.buy_uv||0)-(a.buy_uv||0);}).slice(0,15).map(function(l){return '<tr class="'+(l.is_self?'self-row':'')+'"><td>'+(l.is_self?'⭐':'')+' '+(l.name?l.name.slice(0,28):l.pid)+'</td><td class="num">'+won(l.price)+'</td><td class="num">'+pct(l.ctr)+'</td><td class="num">'+pct(l.cvr)+'</td><td class="num">'+(l.buy_uv||0).toLocaleString()+'</td></tr>';}).join('');
    h+='<div class="card"><h3>🏷️ PB 라인업 <span style="font-weight:400;color:var(--text3);font-size:12px">· 상위 15 (구매UV순)</span></h3><table><thead><tr><th>상품</th><th class="num">가격</th><th class="num">CTR</th><th class="num">CVR</th><th class="num">구매UV</th></tr></thead><tbody>'+lrows+'</tbody></table></div>';
  }
  return h;
}

function viewMprice(){
  if(!M||!M.decomp) return '<div class="ph">매트리스 데이터 없음</div>';
  const mats=selfPids('furniture').filter(function(p){return meta(p).group==='매트리스';});
  let h='<div class="insight">매트리스 <b>실객단가는 표시가와 다름</b> — 사이즈(S/SS/D/Q/K/LK)·경도(미디엄/미디엄소프트/미디엄하드)별 옵션 객단가. 방수커버 옵션 제외.</div>';
  h+='<div class="kpi-row">'+mats.map(function(pid){ const up=unitPrice(pid); return '<div class="kpi"><div class="lbl">'+sn(pid)+'</div><div class="val">'+won(up)+'</div><div class="sub">표시가 '+won(meta(pid).price)+'</div></div>';}).join('')+'</div>';
  mats.forEach(function(pid){
    const dc=((M.decomp&&M.decomp[pid])||[]).slice().sort(function(a,b){return (b.gmv||0)-(a.gmv||0);});
    if(!dc.length) return;
    const rows=dc.map(function(r){return '<tr><td>'+(r.hardness||'')+'</td><td>'+(r.size||'')+'</td><td class="num">'+(r.qty||0).toLocaleString()+'</td><td class="num">'+won(r.unit)+'</td><td class="num">'+won(r.gmv)+'</td></tr>';}).join('');
    h+='<div class="card"><h3>'+(meta(pid).emoji||'🟦')+' '+sn(pid)+' 사이즈×경도 분해</h3><div class="chart-box sm"><canvas id="mp-'+pid+'"></canvas></div>'+
      '<table style="margin-top:10px"><thead><tr><th>경도</th><th>사이즈</th><th class="num">수량</th><th class="num">객단가</th><th class="num">GMV</th></tr></thead><tbody>'+rows+'</tbody></table></div>';
  });
  return h;
}

function viewAttach(){
  if(!M) return '<div class="ph">데이터 없음</div>';
  const afo=M.attach_frame_option||[]; const cos=M.cosell||[];
  let h='<div class="insight">🔗 <b>프레임 합구매 2종</b> — ①프레임 옵션으로 붙은 매트리스(극소량) ②같은 주문에 별도 담긴 매트리스(카트 교차구매). <b>수면밀도가 교차구매 1위 — 우리 프레임이 만든 매트리스 수요가 경쟁사로 유출</b>.</div>';
  h+='<div class="grid2">'+
    '<div class="card"><h3>① 프레임 옵션 매트리스 (월별)</h3><div class="chart-box sm"><canvas id="at-afo"></canvas></div><div class="note">프레임 상품번호 옵션의 "페이브 매트리스". 매트리스 PID엔 안 잡히는 분. 월 1~7대로 소량.</div></div>'+
    '<div class="card"><h3>② 카트 교차구매 매트리스 <span style="font-weight:400;color:var(--text3);font-size:12px">· 최근 3개월</span></h3>'+
    (cos.length?'<table><thead><tr><th>매트리스</th><th>브랜드</th><th class="num">주문</th><th class="num">수량</th><th class="num">GMV</th></tr></thead><tbody>'+
      cos.slice(0,15).map(function(c){return '<tr class="'+(c.is_self?'self-row':'')+'"><td>'+(c.is_self?'⭐':'')+' '+(c.name||'').slice(0,22)+'</td><td>'+(c.brand||'')+'</td><td class="num">'+(c.orders||0)+'</td><td class="num">'+(c.qty||0)+'</td><td class="num">'+won(c.gmv)+'</td></tr>';}).join('')+
      '</tbody></table>':'<div class="ph">데이터 없음</div>')+
    '</div></div>';
  return h;
}

function lineChart(id,labels,datasets,yPct){
  const el=document.getElementById(id); if(!el) return;
  charts[id]=new Chart(el,{type:'line',data:{labels:labels,datasets:datasets},options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},
    plugins:{legend:{display:datasets.length>1,labels:{boxWidth:12,font:{size:11}}}},
    scales:{x:{ticks:{maxTicksLimit:8,font:{size:10}}},y:{beginAtZero:true,ticks:{font:{size:10},callback:function(v){return yPct?v+'%':(Math.abs(v)>=1e6?(v/1e8).toFixed(1)+'억':Math.abs(v)>=1e4?Math.round(v/1e4)+'만':v);}}}}}});
}
function dsFor(pid,field,color,calc){
  const dd=daily(pid); const map={}; dd.forEach(function(r){ map[r.dt]= calc?calc(r):r[field]; });
  return {label:sn(pid),data:LB.map(function(dt){return map[dt]!=null?map[dt]:null;}),borderColor:color,backgroundColor:color+'22',borderWidth:2,pointRadius:0,tension:.25,spanGaps:true};
}
function seriesPids(pid){ return [pid].concat(compsOf(pid)); }
function buildDetailCharts(){
  if(S.sub==='metrics') buildMetricCharts();
  else if(S.sub==='srp') buildSrpCharts();
  else if(S.sub==='inflow') buildInflowChart();
  else if(S.sub==='age') buildAgeChart();
}
function buildMetricCharts(){
  const dd=daily(S.pid); LB=dd.map(function(r){return r.dt;});
  const pids=seriesPids(S.pid); const cols=[COL.self,COL.c1,COL.c2,COL.blue];
  lineChart('ch-gmv',LB,pids.map(function(p,i){return dsFor(p,'gmv',cols[i]||COL.gray);}));
  lineChart('ch-qty',LB,[dsFor(S.pid,'qty',COL.self)]);
  lineChart('ch-ctr',LB,pids.map(function(p,i){return dsFor(p,null,cols[i]||COL.gray,function(r){return r.imp?+(r.pdp/r.imp*100).toFixed(2):null;});}),true);
  lineChart('ch-cvr',LB,pids.map(function(p,i){return dsFor(p,null,cols[i]||COL.gray,function(r){return r.pdp_uv?+(r.buy_uv/r.pdp_uv*100).toFixed(2):null;});}),true);
}
function buildSrpCharts(){
  const pids=seriesPids(S.pid); const cols=[COL.self,COL.c1,COL.c2,COL.blue];
  const sd=(D.scoreTs&&D.scoreTs[S.pid])||[];
  if(sd.length){ const lb=sd.map(function(r){return r.dt;});
    const ds=pids.map(function(p,i){ const arr=(D.scoreTs&&D.scoreTs[p])||[]; const m={}; arr.forEach(function(r){m[r.dt]=r.score;}); return {label:sn(p),data:lb.map(function(d){return m[d]!=null?m[d]:null;}),borderColor:cols[i]||COL.gray,backgroundColor:'transparent',borderWidth:2,pointRadius:0,tension:.25,spanGaps:true};});
    lineChart('ch-score',lb,ds);
  }
  const fd=(D.srpFeatureTs&&D.srpFeatureTs[S.pid])||[];
  if(fd.length){ const lb=fd.map(function(r){return r.dt;});
    const feats=[['review','리뷰','#6c5ce7'],['sell28','판매28','#00b894'],['view28','뷰28','#e6a817'],['spv28','뷰당판매','#3b82f6'],['wish','찜','#ff6b6b'],['card','장바구니','#8b5cf6']];
    const ds=feats.map(function(f){return {label:f[1],data:fd.map(function(r){return r[f[0]]!=null?r[f[0]]:null;}),borderColor:f[2],backgroundColor:'transparent',borderWidth:1.6,pointRadius:0,tension:.25,spanGaps:true};});
    const el=document.getElementById('ch-feat'); if(el) charts['ch-feat']=new Chart(el,{type:'line',data:{labels:lb,datasets:ds},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{boxWidth:10,font:{size:10}}}},scales:{x:{ticks:{maxTicksLimit:8,font:{size:10}}},y:{min:0,max:1,ticks:{font:{size:10}}}}}});
  }
}
function buildInflowChart(){
  const rows=(D.inflow||[]).filter(function(r){return String(r.pid)===String(S.pid);}); if(!rows.length) return;
  const dates=Array.from(new Set(rows.map(function(r){return r.dt;}))).sort();
  const chans=Array.from(new Set(rows.map(function(r){return r.inflow;})));
  const ds=chans.map(function(ch,i){ const m={}; rows.filter(function(r){return r.inflow===ch;}).forEach(function(r){m[r.dt]=r.imp||0;}); return {label:ch,data:dates.map(function(d){return m[d]||0;}),backgroundColor:CHANNEL_COLORS[i%CHANNEL_COLORS.length]};});
  const el=document.getElementById('ch-inflow'); if(!el) return;
  charts['ch-inflow']=new Chart(el,{type:'bar',data:{labels:dates,datasets:ds},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{boxWidth:10,font:{size:10}}}},scales:{x:{stacked:true,ticks:{maxTicksLimit:14,font:{size:9}}},y:{stacked:true,ticks:{font:{size:10}}}}}});
}
function buildAgeChart(){
  const e=((D.ages&&D.ages.buyer)||[]).find(function(x){return String(x.pid)===String(S.pid)||String(x.product||'').indexOf(S.pid)>=0;});
  if(!e||!e.age) return; const el=document.getElementById('ch-age'); if(!el) return;
  const ks=Object.keys(e.age);
  charts['ch-age']=new Chart(el,{type:'bar',data:{labels:ks,datasets:[{label:'비중 %',data:ks.map(function(k){return e.age[k];}),backgroundColor:COL.self}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{font:{size:10},callback:function(v){return v+'%';}}},x:{ticks:{font:{size:10}}}}}});
}
function buildMpriceCharts(){
  const mats=selfPids('furniture').filter(function(p){return meta(p).group==='매트리스';});
  mats.forEach(function(pid){ const dc=((M.decomp&&M.decomp[pid])||[]).slice().sort(function(a,b){return (b.gmv||0)-(a.gmv||0);}); const el=document.getElementById('mp-'+pid); if(!el||!dc.length) return;
    charts['mp-'+pid]=new Chart(el,{type:'bar',data:{labels:dc.map(function(r){return (r.hardness||'')+' '+(r.size||'');}),datasets:[{label:'객단가',data:dc.map(function(r){return r.unit;}),backgroundColor:COL.self,yAxisID:'y'},{label:'수량',data:dc.map(function(r){return r.qty;}),backgroundColor:COL.c1,type:'line',borderColor:COL.c1,yAxisID:'y1',pointRadius:2}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{boxWidth:10,font:{size:10}}}},scales:{x:{ticks:{font:{size:9},maxRotation:60}},y:{position:'left',ticks:{font:{size:9},callback:function(v){return Math.round(v/1e4)+'만';}}},y1:{position:'right',grid:{display:false},ticks:{font:{size:9}}}}}});
  });
}
function buildAttachCharts(){
  const afo=(M&&M.attach_frame_option)||[]; const el=document.getElementById('at-afo'); if(!el||!afo.length) return;
  charts['at-afo']=new Chart(el,{type:'bar',data:{labels:afo.map(function(r){return r.yyyymm;}),datasets:[{label:'GMV',data:afo.map(function(r){return r.gmv;}),backgroundColor:COL.self,yAxisID:'y'},{label:'수량',data:afo.map(function(r){return r.qty;}),type:'line',borderColor:COL.c1,pointRadius:3,yAxisID:'y1'}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{boxWidth:10,font:{size:10}}}},scales:{y:{position:'left',ticks:{font:{size:9},callback:function(v){return Math.round(v/1e4)+'만';}}},y1:{position:'right',grid:{display:false},beginAtZero:true,ticks:{font:{size:9}}}}}});
}

Promise.all([
  fetch('tf-data.json').then(function(r){return r.json();}),
  fetch('tf-mattress-data.json').then(function(r){return r.json();}).catch(function(){return null;})
]).then(function(res){ D=res[0]; M=res[1]; try{ if(sessionStorage.getItem('startDiv')==='furniture'){ S.div='furniture'; sessionStorage.removeItem('startDiv'); } }catch(e){} render(); })
.catch(function(e){ document.getElementById('content').innerHTML='<div class="ph">데이터 로드 실패: '+e.message+'</div>'; });
</script>
