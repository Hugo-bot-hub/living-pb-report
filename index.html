<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Pretendard Variable','Pretendard',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f2f5;color:#1e293b;font-size:14px;line-height:1.6;}
.wrap{max-width:1440px;margin:0 auto;padding:0 24px 40px;}
.hdr{background:linear-gradient(135deg,#0f172a 0%,#1e3a5f 100%);color:#fff;padding:32px;margin-bottom:0;}

.hdr .sub{font-size:13px;color:#94a3b8;margin-top:6px;}

/* Tabs */
.tabs{display:flex;background:#fff;border-bottom:2px solid #e2e8f0;padding:0 24px;position:sticky;top:0;z-index:100;}
.tab{padding:14px 28px;cursor:pointer;font-size:15px;font-weight:600;color:#64748b;border-bottom:3px solid transparent;transition:all .2s;}
.tab:hover{color:#334155;background:#f8fafc;}
.tab.on{color:#2563eb;border-bottom-color:#2563eb;}

/* Cards */
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;margin:24px 0;}
.card{background:#fff;border-radius:12px;padding:20px 24px;box-shadow:0 1px 3px rgba(0,0,0,.06);}
.card .lbl{font-size:12px;color:#64748b;font-weight:500;margin-bottom:6px;}
.card .val{font-size:28px;font-weight:800;color:#0f172a;}
.card .chg{font-size:13px;margin-top:4px;font-weight:600;}
.card .chg.up{color:#16a34a;}.card .chg.down{color:#dc2626;}.card .chg.flat{color:#64748b;}

/* Category section */

.cat-card h3{font-size:16px;font-weight:700;margin-bottom:12px;}
.cat-row{display:flex;justify-content:space-between;padding:4px 0;font-size:13px;}
.cat-row .k{color:#64748b;}.cat-row .v{font-weight:600;}
.cat-row .v.good{color:#16a34a;}.cat-row .v.bad{color:#dc2626;}

.gap-badge.pos{background:#dcfce7;color:#16a34a;}.gap-badge.neg{background:#fef2f2;color:#dc2626;}

.promo-bigpromo{background:#fee2e2;color:#dc2626;}
.promo-special{background:#dbeafe;color:#2563eb;}
.promo-normal{background:#f3f4f6;color:#6b7280;}
.promo-current{background:#fef3c7;color:#92400e;}

.insight-box .hl{color:#1e293b;font-weight:600;}
.insight-box .up-hl{color:#16a34a;font-weight:700;}.insight-box .dn-hl{color:#dc2626;font-weight:700;}

table{width:100%;border-collapse:collapse;font-size:13px;}
thead{position:sticky;top:52px;z-index:10;}
th{padding:12px 14px;text-align:right;font-weight:700;color:#475569;background:#f8fafc;border-bottom:2px solid #e2e8f0;white-space:nowrap;cursor:pointer;user-select:none;font-size:13px;}

.period-hdr{background:#eef2ff !important;font-weight:700;text-align:center !important;font-size:13px;color:#1e40af;}

/* Panels */
.panel{display:none;}.panel.on{display:block;}
.footer{text-align:center;padding:20px;font-size:11px;color:#94a3b8;}
@media(max-width:768px){

function s(v,fb){return(v===null||v===undefined||v!==v)?fb:v;}

function fMw(v){v=s(v,null);if(v===null)return'—';const b=v/100;if(Math.abs(b)>=100)return(b/100).toFixed(1)+'억';return b.toFixed(1);}
function fGmvUnit(v){v=s(v,null);if(v===null)return'백만원';return Math.abs(v)>=100?'억':'백만원';}
function fGmvUnitW(v){v=s(v,null);if(v===null)return'백만원';return Math.abs(v/100)>=100?'억':'백만원';}
function fN(v){v=s(v,null);if(v===null)return'—';if(v>=10000)return(v/10000).toFixed(1)+'만';if(v>=1000)return(v/1000).toFixed(1)+'K';return v.toLocaleString('ko-KR');}
function fP(v){v=s(v,null);if(v===null)return'—';return v.toFixed(2)+'%';}
function fPct(cur,prev){if(!prev||prev===0)return{t:'—',c:'flat'};const p=(cur-prev)/prev*100;if(p!==p||!isFinite(p))return{t:'—',c:'flat'};return{t:(p>0?'+':'')+p.toFixed(1)+'%',c:p>0?'up':p<0?'down':'flat'};}
function cvrCls(cvr,bench){if(cvr===null||bench===null||bench===undefined)return'cvr-y';if(cvr>=bench*1.2)return'cvr-dg';if(cvr>=bench)return'cvr-g';if(cvr>=bench*0.8)return'cvr-y';return'cvr-r';}
function gapBadge(cvr,bench){if(cvr===null||bench===null||bench===undefined)return'';const g=(cvr-bench).toFixed(2);const c=parseFloat(g)>=0?'pos':'neg';return'<span class="gap-badge '+c+'">'+(parseFloat(g)>=0?'+':'')+g+'%p</span>';}
function weekRange(ws){const d=new Date(ws);const e=new Date(d);e.setDate(e.getDate()+6);return(d.getMonth()+1)+'/'+d.getDate()+'~'+(e.getMonth()+1)+'/'+e.getDate();}
function monthLabel(ms){const d=new Date(ms);return d.getFullYear()+'년 '+(d.getMonth()+1)+'월';}
function promoTag(weekStr){const pm=D.weekly.promoMap||{};const type=pm[weekStr];if(!type)return'';if(type==='빅프로모션')return'<span class="promo-badge promo-bigpromo">빅프로모션</span>';if(type==='스페셜브랜드위크')return'<span class="promo-badge promo-special">스페셜브랜드위크</span>';if(type.includes('진행중'))return'<span class="promo-badge promo-current">'+type+'</span>';if(type==='비프로모')return'<span class="promo-badge promo-normal">비프로모</span>';return'<span class="promo-badge promo-normal">'+type+'</span>';}

function renderDaily(){
  const dd = D.daily;
  const prods = dd.products || [];
  const catS = dd.summary || {};
  const totalGmv = s(dd.totalGmv,0);
  const totalGmvPrev = s(dd.totalGmvPrev,0);
  const totalChg = fPct(totalGmv, totalGmvPrev);

  const totalImp = prods.reduce((a,p)=>a+s(p.imp,0),0);
  const totalBuy = prods.reduce((a,p)=>a+(p.purchase!==null?s(p.purchase,0):0),0);
  const totalPdp = prods.reduce((a,p)=>a+s(p.pdp,0),0);
  const avgCvr = totalPdp>0?(totalBuy/totalPdp*100).toFixed(2):'—';

  let h = '';
  // Summary cards
  h += '<div class="cards">';
  h += '<div class="card"><div class="lbl">3/24(월) 총 GMV</div><div class="val">'+fM(totalGmv)+'<span style="font-size:14px;color:#64748b;font-weight:500;"> '+fGmvUnit(totalGmv)+'</span></div><div class="chg '+totalChg.c+'">전일(3/23) 대비 '+totalChg.t+'</div></div>';
  h += '<div class="card"><div class="lbl">총 노출</div><div class="val">'+fN(totalImp)+'</div></div>';
  h += '<div class="card"><div class="lbl">총 구매자수</div><div class="val">'+totalBuy.toLocaleString()+'<span style="font-size:14px;color:#64748b;"> 명</span></div></div>';
  h += '<div class="card"><div class="lbl">평균 전환율 (CVR)</div><div class="val">'+avgCvr+'<span style="font-size:14px;color:#64748b;">%</span></div></div>';
  h += '</div>';

  // Category cards - now 가구PB and 리빙PB
  h += '<div class="cat-grid">';
  const cats = [['가구PB','c-furniture'],['리빙PB','c-living']];
  cats.forEach(([catName,cls])=>{
    const cd = catS[catName] || {};
    const gmv = s(cd.gmv,0);
    const gmvPrev = s(cd.gmvPrev,0);
    const chg = fPct(gmv, gmvPrev);
    const imp = s(cd.imp,0);
    const pdp = s(cd.pdp,0);
    const pur = s(cd.purchase,0);
    const pbCtr = imp>0?(pdp/imp*100).toFixed(2):'—';
    const pbCvr = pdp>0?(pur/pdp*100).toFixed(2):'—';
    // Get category average from 3P
    let benchCtrSum=0,benchCvrSum=0,benchN=0;
    const orgs = D.orgMapping[catName]||[];
    orgs.forEach(orgCat=>{
      const benchKeys=Object.keys(dd.dailyBench||{}).filter(k=>k.startsWith(orgCat+'|'));
      benchKeys.forEach(k=>{const b=(dd.dailyBench[k]||{})['2026-03-24'];if(b){benchCtrSum+=s(b.ctr,0);benchCvrSum+=s(b.cvr,0);benchN++;}});
    });
    const benchCtr = benchN>0?(benchCtrSum/benchN).toFixed(2):'—';
    const benchCvr = benchN>0?(benchCvrSum/benchN).toFixed(2):'—';

    h += '<div class="cat-card '+cls+'">';
    h += '<h3>'+catName+'</h3>';
    h += '<div class="cat-row"><span class="k">GMV (3/24)</span><span class="v">'+fM(gmv)+' 백만원</span></div>';
    h += '<div class="cat-row"><span class="k">전일 대비</span><span class="v '+chg.c+'">'+chg.t+'</span></div>';
    h += '<div class="cat-row"><span class="k">PB CTR</span><span class="v">'+pbCtr+'%</span></div>';
    h += '<div class="cat-row"><span class="k">카테고리 평균 CTR</span><span class="v">'+benchCtr+'%</span></div>';
    h += '<div class="cat-row"><span class="k">PB CVR</span><span class="v">'+pbCvr+'%</span></div>';
    h += '<div class="cat-row"><span class="k">카테고리 평균 CVR</span><span class="v">'+benchCvr+'%</span></div>';
    h += '</div>';
  });
  h += '</div>';

  // Insights
  h += '<div class="insight-box">';
  h += '<h3>📊 일간 분석 인사이트 — 2026년 3월 24일 (월)</h3>';

  // GMV analysis
  h += '<div class="section"><h4>📈 매출 현황</h4>';
  h += '<p>3월 24일(월) PB 전체 GMV는 <span class="hl">'+fM(totalGmv)+' 백만원</span>으로, ';
  h += '전일(3/23, 일요일) <span class="hl">'+fM(totalGmvPrev)+' 백만원</span> 대비 ';
  if(totalChg.c==='down') h += '<span class="dn-hl">'+totalChg.t+'</span> 하락했습니다. 주말→평일 전환 및 요일 효과를 고려하면 자연스러운 변동폭입니다.</p>';
  else h += '<span class="up-hl">'+totalChg.t+'</span> 상승했습니다.</p>';

  // Top products
  const top3 = prods.filter(p=>p.gmv>0).slice(0,3);
  h += '<p>상위 매출 제품: ';
  top3.forEach((p,i)=>{
    const share = totalGmv>0?(p.gmv/totalGmv*100).toFixed(1):'0';
    h += '<span class="hl">'+(i+1)+'. '+p.name.substring(0,35)+'</span> ('+fM(p.gmv)+'백만원, '+share+'%)';
    if(i<2)h+=', ';
  });
  h += '. 상위 3개 제품이 전체의 <span class="hl">'+(totalGmv>0?((top3.reduce((a,p)=>a+p.gmv,0))/totalGmv*100).toFixed(1):'0')+'%</span>를 차지합니다.</p>';
  h += '</div>';

  // CVR analysis
  h += '<div class="section"><h4>🎯 전환율 분석</h4>';
  const goodCvr = prods.filter(p=>p.cvr!==null&&p.benchCvr!==null&&p.cvr>=p.benchCvr&&p.gmv>0);
  const badCvr = prods.filter(p=>p.cvr!==null&&p.benchCvr!==null&&p.cvr<p.benchCvr*0.5&&p.gmv>0);
  h += '<p>카테고리 평균 CVR 대비 <span class="up-hl">달성 상품 '+goodCvr.length+'개</span>, <span class="dn-hl">50% 미만 상품 '+badCvr.length+'개</span>입니다. ';
  if(badCvr.length>0){
    h += '특히 전환율 개선이 필요한 제품: ';
    badCvr.slice(0,3).forEach((p,i)=>{
      h += '<span class="dn-hl">'+p.name.substring(0,25)+'</span>(CVR '+fP(p.cvr)+' vs 카테고리 평균 '+fP(p.benchCvr)+')';
      if(i<Math.min(2,badCvr.length-1))h+=', ';
    });
    h += '. 이 제품들은 노출 대비 구매 전환이 크게 낮아 PDP 콘텐츠 개선 또는 가격 경쟁력 점검이 필요합니다.</p>';
  } else h += '</p>';

  // CTR analysis
  h += '</div><div class="section"><h4>👁️ 노출 효율 분석</h4>';
  const highImpLowCtr = prods.filter(p=>p.imp>10000&&p.ctr!==null&&p.benchCtr!==null&&p.ctr<p.benchCtr).sort((a,b)=>b.imp-a.imp);
  if(highImpLowCtr.length>0){
    h += '<p>노출은 높으나 CTR이 카테고리 평균 이하인 제품이 <span class="dn-hl">'+highImpLowCtr.length+'개</span> 있습니다. ';
    h += '대표적으로 ';
    highImpLowCtr.slice(0,2).forEach((p,i)=>{
      h += '<span class="hl">'+p.name.substring(0,25)+'</span>(노출 '+fN(p.imp)+', CTR '+fP(p.ctr)+' vs 평균 '+fP(p.benchCtr)+')';
      if(i===0&&highImpLowCtr.length>1)h += ', ';
    });
    h += '. 썸네일 이미지, 가격 표시, 뱃지 등 리스팅 요소 최적화가 권장됩니다.</p>';
  }
  h += '</div>';

  // ── 일간 조직별 퍼널 진단 ──
  h += '<div class="section"><h4>🔍 조직별 퍼널 진단 (일간)</h4>';
  const dOrgMap = D.orgMapping || {};
  Object.keys(dOrgMap).forEach(orgName=>{
    const orgCats = dOrgMap[orgName] || [];
    const orgP = prods.filter(p=>orgCats.includes(p.cate1));
    let oI=0,oP2=0,oB=0,oG=0;
    orgP.forEach(p=>{oI+=s(p.imp,0);oP2+=s(p.pdp,0);oB+=(p.purchase!==null?s(p.purchase,0):0);oG+=s(p.gmv,0);});
    const oCtr2=oI>0?(oP2/oI*100):0;
    const oCvr2=oP2>0?(oB/oP2*100):0;
    let bCS2=0,bCV2=0,bN2=0;
    Object.keys(dd.dailyBench||{}).forEach(k=>{
      const c1=k.split('|')[0];
      if(orgCats.includes(c1)){const b2=(dd.dailyBench[k]||{})['2026-03-24'];if(b2){bCS2+=s(b2.ctr,0);bCV2+=s(b2.cvr,0);bN2++;}}});
    const bCtr2=bN2>0?(bCS2/bN2):0;
    const bCvr2=bN2>0?(bCV2/bN2):0;
    const cvrR2=bCvr2>0?(oCvr2/bCvr2*100):0;
    let bn='',rc='';
    if(oI<5000){bn='노출 부족';rc='기획전/딜 노출 확보 필요';}
    else if(bCtr2>0&&oCtr2<bCtr2*0.8){bn='CTR 미달 (3P 평균의 '+(oCtr2/bCtr2*100).toFixed(0)+'%)';rc='썸네일/가격표시 최적화 권장';}
    else if(cvrR2<60){bn='CVR 구조적 문제 (3P 평균의 '+cvrR2.toFixed(0)+'%)';rc='PDP 콘텐츠/리뷰/가격 점검 필요';}
    else if(cvrR2<80){bn='CVR 소폭 미달 (3P 평균의 '+cvrR2.toFixed(0)+'%)';rc='상세 페이지 개선 여지 있음';}
    else{bn='퍼널 양호 (3P 평균의 '+cvrR2.toFixed(0)+'%)';rc='현 전략 유지';}
    h+='<div style="margin:12px 0;padding:16px;background:#f8fafc;border-radius:8px;border-left:3px solid '+(orgName==='가구PB'?'#3b82f6':'#f59e0b')+';">';
    h+='<p style="font-weight:700;font-size:15px;margin-bottom:10px;">'+orgName+'</p>';
    h+='<table style="width:100%;font-size:13px;border-collapse:collapse;">';
    h+='<tr style="border-bottom:1px solid #e2e8f0;"><td style="padding:6px 0;color:#64748b;">노출</td><td style="text-align:right;font-weight:600;">'+fN(oI)+'</td><td style="padding-left:16px;color:#64748b;">PDP</td><td style="text-align:right;font-weight:600;">'+fN(oP2)+'</td><td style="padding-left:16px;color:#64748b;">구매</td><td style="text-align:right;font-weight:600;">'+oB+'명</td></tr>';
    h+='<tr style="border-bottom:1px solid #e2e8f0;"><td style="padding:6px 0;color:#64748b;">PB CTR</td><td style="text-align:right;font-weight:600;">'+oCtr2.toFixed(2)+'%</td><td style="padding-left:16px;color:#64748b;">3P 평균 CTR</td><td style="text-align:right;font-weight:600;">'+(bCtr2>0?bCtr2.toFixed(2)+'%':'—')+'</td><td style="padding-left:16px;color:#64748b;">Gap</td><td style="text-align:right;font-weight:600;color:'+(oCtr2>=bCtr2?'#16a34a':'#dc2626')+';">'+(bCtr2>0?(oCtr2-bCtr2>=0?'+':'')+(oCtr2-bCtr2).toFixed(2)+'%p':'—')+'</td></tr>';
    h+='<tr style="border-bottom:1px solid #e2e8f0;"><td style="padding:6px 0;color:#64748b;">PB CVR</td><td style="text-align:right;font-weight:600;">'+oCvr2.toFixed(2)+'%</td><td style="padding-left:16px;color:#64748b;">3P 평균 CVR</td><td style="text-align:right;font-weight:600;">'+(bCvr2>0?bCvr2.toFixed(2)+'%':'—')+'</td><td style="padding-left:16px;color:#64748b;">Gap</td><td style="text-align:right;font-weight:600;color:'+(oCvr2>=bCvr2?'#16a34a':'#dc2626')+';">'+(bCvr2>0?(oCvr2-bCvr2>=0?'+':'')+(oCvr2-bCvr2).toFixed(2)+'%p':'—')+'</td></tr>';
    h+='</table>';
    h+='<p style="margin-top:10px;"><span style="color:'+(cvrR2>=80?'#16a34a':'#dc2626')+';font-weight:700;">▸ 주요 병목: '+bn+'</span></p>';
    h+='<p style="color:#475569;font-size:13px;">→ '+rc+'</p>';
    h+='</div>';
  });
  h += '</div></div>';

  // Product table
  h += '<div class="tbl-wrap"><table id="tbl-daily">';
  h += '<thead><tr><th data-col="name" data-dir="asc">제품명 <span class="arr">↕</span></th>';
  h += '<th data-col="cat">카테고리 <span class="arr">↕</span></th>';
  h += '<th data-col="gmv" class="sorted" data-dir="desc">GMV <span class="arr">▼</span></th>';
  h += '<th data-col="imp">노출 <span class="arr">↕</span></th>';
  h += '<th data-col="ctr">CTR(%) <span class="arr">↕</span></th>';
  h += '<th data-col="benchCtr">카테고리 평균 CTR <span class="arr">↕</span></th>';
  h += '<th data-col="pdp">PDP <span class="arr">↕</span></th>';
  h += '<th data-col="purchase">구매자수 <span class="arr">↕</span></th>';
  h += '<th data-col="cvr">CVR(%) <span class="arr">↕</span></th>';
  h += '<th data-col="benchCvr">카테고리 평균 CVR <span class="arr">↕</span></th>';
  h += '</tr></thead><tbody>';

  prods.filter(p=>p.gmv>0||p.purchase>0).forEach(p=>{
    const cv = s(p.cvr,null);
    const bc = s(p.benchCvr,null);
    const bct = s(p.benchCtr,null);
    const cls = cvrCls(cv,bc);
    const ctrCls2 = cvrCls(s(p.ctr,null),bct);
    h += '<tr>';
    h += '<td title="'+p.name+'">'+p.name+'</td>';
    h += '<td>'+p.cate1+'/'+p.cate2+'</td>';
    h += '<td>'+fM(p.gmv)+'</td>';
    h += '<td>'+fN(p.imp)+'</td>';
    h += '<td><span class="cvr-pill '+ctrCls2+'">'+(p.ctr!==null?fP(p.ctr):'—')+'</span></td>';
    h += '<td>'+(bct!==null?fP(bct):'—')+gapBadge(s(p.ctr,null),bct)+'</td>';
    h += '<td>'+fN(p.pdp)+'</td>';
    h += '<td>'+(p.purchase!==null?p.purchase:'—')+'</td>';
    h += '<td><span class="cvr-pill '+cls+'">'+(cv!==null?fP(cv):'—')+'</span></td>';
    h += '<td>'+(bc!==null?fP(bc):'—')+gapBadge(cv,bc)+'</td>';
    h += '</tr>';
  });
  h += '</tbody></table></div>';

  document.getElementById('panel-daily').innerHTML = h;
  setupSort('tbl-daily', prods.filter(p=>p.gmv>0||p.purchase>0));
}

// WEEKLY PANEL
// ═══════════════════════════════════
function renderWeekly(){
  const wd = D.weekly;
  const weeks = wd.weeks || [];
  const ws = wd.summary || {};
  const prods = wd.products || [];
  const bp3 = wd.bp3Cvr || {};

  if(weeks.length<2) return;
  const latest = weeks[weeks.length-1];
  const prev = weeks[weeks.length-2];
  const latestS = ws[latest]||{};
  const prevS = ws[prev]||{};
  const totalChg = fPct(s(latestS.total,0), s(prevS.total,0));

  let h = '';
  // Summary
  h += '<div class="cards">';
  h += '<div class="card"><div class="lbl">최신주 ('+weekRange(latest)+') GMV</div><div class="val">'+fMw(s(latestS.total,0))+'<span style="font-size:14px;color:#64748b;"> '+fGmvUnitW(s(latestS.total,0))+'</span></div><div class="chg '+totalChg.c+'">전주('+weekRange(prev)+') 대비 '+totalChg.t+'</div></div>';

  const totalImp = prods.reduce((a,p)=>{const w=(p.weekly||{})[latest]||{};return a+s(w.imp,0);},0);
  const totalBuy = prods.reduce((a,p)=>{const w=(p.weekly||{})[latest]||{};return a+s(w.buyUv,0);},0);
  const totalPdp = prods.reduce((a,p)=>{const w=(p.weekly||{})[latest]||{};return a+s(w.pdpUv,0);},0);
  const avgCvr = totalPdp>0?(totalBuy/totalPdp*100).toFixed(2):'—';

  h += '<div class="card"><div class="lbl">총 노출 ('+weekRange(latest)+')</div><div class="val">'+fN(totalImp)+'</div></div>';
  h += '<div class="card"><div class="lbl">총 구매자수</div><div class="val">'+totalBuy.toLocaleString()+'<span style="font-size:14px;color:#64748b;"> 명</span></div></div>';
  h += '<div class="card"><div class="lbl">평균 전환율</div><div class="val">'+avgCvr+'<span style="font-size:14px;color:#64748b;">%</span></div></div>';
  h += '</div>';

  // Category cards - now 가구PB and 리빙PB
  h += '<div class="cat-grid">';
  const cats = [['가구PB','c-furniture'],['리빙PB','c-living']];
  cats.forEach(([catName,cls])=>{
    const curGmv = s(latestS[catName],0);
    const prevGmv = s(prevS[catName],0);
    const chg = fPct(curGmv,prevGmv);
    // Calc category avg CVR from bp3
    let bSum=0,bN=0;
    const orgs = D.orgMapping[catName]||[];
    orgs.forEach(orgCat=>{
      const benchKeys=Object.keys(bp3).filter(k=>k.startsWith(orgCat+'|'));
      benchKeys.forEach(k=>{const v=(bp3[k]||{})[latest];if(v!==undefined&&v!==null){bSum+=v;bN++;}});
    });
    const benchCvr = bN>0?(bSum/bN).toFixed(2):'—';
    // PB avg CVR
    const catProds = prods.filter(p=>{
      const orgCats = D.orgMapping[catName]||[];
      return orgCats.includes(p.cate1);
    });
    let lBuy=0,lPdp=0;
    catProds.forEach(p=>{const w=(p.weekly||{})[latest]||{};lBuy+=s(w.buyUv,0);lPdp+=s(w.pdpUv,0);});
    const pbCvr = lPdp>0?(lBuy/lPdp*100).toFixed(2):'—';

    h += '<div class="cat-card '+cls+'">';
    h += '<h3>'+catName+'</h3>';
    h += '<div class="cat-row"><span class="k">GMV ('+weekRange(latest)+')</span><span class="v">'+fMw(curGmv)+' 백만원</span></div>';
    h += '<div class="cat-row"><span class="k">전주 대비</span><span class="v '+chg.c+'">'+chg.t+'</span></div>';
    h += '<div class="cat-row"><span class="k">PB 평균 CVR</span><span class="v">'+pbCvr+'%</span></div>';
    h += '<div class="cat-row"><span class="k">카테고리 평균 CVR</span><span class="v">'+benchCvr+'%</span></div>';
    if(pbCvr!=='—'&&benchCvr!=='—'){
      const gap = (parseFloat(pbCvr)-parseFloat(benchCvr)).toFixed(2);
      const gc = parseFloat(gap)>=0?'good':'bad';
      h += '<div class="cat-row"><span class="k">Gap</span><span class="v '+gc+'">'+(parseFloat(gap)>=0?'+':'')+gap+'%p</span></div>';
    }
    h += '</div>';
  });
  h += '</div>';

  // Insights
  h += '<div class="insight-box">';
  h += '<h3>📊 주간 분석 인사이트 — '+weekRange(latest)+' (최신주)</h3>';

  // Promo context
  const promoType = (D.weekly.promoMap||{})[latest] || '평시';
  h += '<div class="section"><h4>🎯 프로모션 상황</h4>';
  h += '<p>이번 주는 <span class="hl">'+promoType+'</span> 기간입니다. ';
  if(promoType.includes('프로모션')) h += '프로모션으로 인한 노출 증가가 반영됩니다. ';
  if(promoType==='비프로모') h += '프로모션 종료 후 기저 수요 수준입니다. ';
  h += '</p></div>';

  h += '<div class="section"><h4>📈 주간 매출 동향</h4>';
  h += '<p>'+weekRange(latest)+' PB 전체 GMV는 <span class="hl">'+fMw(s(latestS.total,0))+' 백만원</span>으로, ';
  h += '전주('+weekRange(prev)+') <span class="hl">'+fMw(s(prevS.total,0))+' 백만원</span> 대비 ';
  h += '<span class="'+(totalChg.c==='up'?'up-hl':'dn-hl')+'">'+totalChg.t+'</span> ';
  h += (totalChg.c==='down'?'감소':'증가')+'했습니다. ';

  // Category breakdown
  cats.forEach(([catName])=>{
    const cur = s(latestS[catName],0);
    const prv = s(prevS[catName],0);
    const cc = fPct(cur,prv);
    h += catName+' <span class="'+(cc.c==='up'?'up-hl':'dn-hl')+'">'+cc.t+'</span>, ';
  });
  h += '</p>';

  // Top weekly products
  const weekProds = prods.map(p=>{const w=(p.weekly||{})[latest]||{};return{...p,latestGmv:s(w.gmv,0),latestCvr:s(w.cvr,null),latestBench:s(w.bench3p,null)};}).sort((a,b)=>b.latestGmv-a.latestGmv);
  const top3w = weekProds.filter(p=>p.latestGmv>0).slice(0,3);
  h += '</div><div class="section"><h4>🏆 주간 상위 성과</h4>';
  h += '<p>주간 매출 Top 3: ';
  top3w.forEach((p,i)=>{
    h += '<span class="hl">'+(i+1)+'. '+p.name.substring(0,30)+'</span> ('+fMw(p.latestGmv)+'백만원)';
    if(i<2)h+=', ';
  });
  h += '.</p></div>';

  // CVR underperformers
  const badW = weekProds.filter(p=>p.latestCvr!==null&&p.latestBench!==null&&p.latestCvr<p.latestBench*0.5&&p.latestGmv>0);
  if(badW.length>0){
    h += '<div class="section"><h4>⚠️ 전환율 개선 필요 상품</h4>';
    h += '<p>카테고리 평균 CVR의 50% 미만인 상품이 <span class="dn-hl">'+badW.length+'개</span> 있습니다. ';
    badW.slice(0,3).forEach((p,i)=>{
      h += p.name.substring(0,25)+' (CVR '+fP(p.latestCvr)+' vs 카테고리 평균 '+fP(p.latestBench)+')';
      if(i<Math.min(2,badW.length-1))h+=', ';
    });
    h += '. PDP 콘텐츠, 리뷰 관리, 가격 경쟁력 점검이 필요합니다.</p></div>';
  }

  // ── 조직별 퍼널 진단 (가구PB / 리빙PB) ──
  h += '<div class="section"><h4>🔍 조직별 퍼널 진단</h4>';
  const orgMap = D.orgMapping || {};
  const orgUnits = Object.keys(orgMap);
  orgUnits.forEach(orgName=>{
    const orgCats = orgMap[orgName] || [];
    const orgProds = prods.filter(p=>orgCats.includes(p.cate1));
    let oImp=0,oPdp=0,oBuy=0,oGmv=0;
    orgProds.forEach(p=>{
      const w=(p.weekly||{})[latest]||{};
      oImp+=s(w.imp,0); oPdp+=s(w.pdpUv,0); oBuy+=s(w.buyUv,0); oGmv+=s(w.gmv,0);
    });
    const oCtr = oImp>0?(oPdp/oImp*100):0;
    const oCvr = oPdp>0?(oBuy/oPdp*100):0;

    // Get category avg CTR/CVR from 3P benchmarks
    let bCtrSum=0,bCtrSum2=0,bCvrSum=0,bN=0,bN2=0;
    Object.keys(bp3).forEach(k=>{
      const cat1 = k.split('|')[0];
      if(orgCats.includes(cat1)){
        const v=(bp3[k]||{})[latest];
        if(v!==undefined&&v!==null){bCvrSum+=v;bN++;}
      }
    });
    // Also get CTR benchmark (from daily 3P or use placeholder)
    let bCtr2 = 0;
    Object.keys(bp3).forEach(k=>{
      const cat1 = k.split('|')[0];
      if(orgCats.includes(cat1)){
        const v=(bp3[k]||{})[latest];
        if(v!==undefined&&v!==null){bCtrSum2+=v;bN2++;}
      }
    });
    bCtr2 = bN2>0?(bCtrSum2/bN2):0;
    const benchCvr = bN>0?(bCvrSum/bN):0;
    const cvrRatio = benchCvr>0?(oCvr/benchCvr*100):0;

    // Diagnose bottleneck
    let bottleneck = '';
    let recommendation = '';
    if(oImp<10000){
      bottleneck = '노출 절대 부족';
      recommendation = '검색 키워드 확장, 기획전/딜 노출 확보, 광고 집행 검토';
    } else if(oCtr<2.0){
      bottleneck = 'CTR 미달 (리스팅 클릭 전환 부족)';
      recommendation = '썸네일 이미지 개선, 가격 표시 최적화, 프로모션 뱃지 활용';
    } else if(cvrRatio<60){
      bottleneck = 'CVR 구조적 문제 (3P 평균의 '+cvrRatio.toFixed(0)+'%)';
      recommendation = 'PDP 콘텐츠 리뉴얼, 리뷰 확보, 가격 경쟁력 점검, 옵션 구성 재검토';
    } else if(cvrRatio<80){
      bottleneck = 'CVR 소폭 미달 (3P 평균의 '+cvrRatio.toFixed(0)+'%)';
      recommendation = '리뷰 이미지 보강, 상세 페이지 A/B 테스트, 첫 구매 혜택 강화';
    } else {
      bottleneck = '퍼널 건강 (3P 평균의 '+cvrRatio.toFixed(0)+'%)';
      recommendation = '현 전략 유지, 노출 확대로 매출 성장 가능';
    }

    h += '<div style="margin:12px 0;padding:16px;background:#f8fafc;border-radius:8px;border-left:3px solid '+(orgName==='가구PB'?'#3b82f6':'#f59e0b')+';">';
    h += '<p style="font-weight:700;font-size:15px;margin-bottom:10px;">'+orgName+'</p>';
    h += '<table style="width:100%;font-size:13px;border-collapse:collapse;">';
    h += '<tr style="border-bottom:1px solid #e2e8f0;"><td style="padding:6px 0;color:#64748b;">노출</td><td style="text-align:right;font-weight:600;">'+fN(oImp)+'</td><td style="padding-left:16px;color:#64748b;">PDP</td><td style="text-align:right;font-weight:600;">'+fN(oPdp)+'</td><td style="padding-left:16px;color:#64748b;">구매</td><td style="text-align:right;font-weight:600;">'+oBuy+'명</td></tr>';
    h += '<tr style="border-bottom:1px solid #e2e8f0;"><td style="padding:6px 0;color:#64748b;">PB CTR</td><td style="text-align:right;font-weight:600;">'+oCtr.toFixed(2)+'%</td><td style="padding-left:16px;color:#64748b;">3P 평균 CTR</td><td style="text-align:right;font-weight:600;">'+(bCtr2>0?bCtr2.toFixed(2)+'%':'—')+'</td><td style="padding-left:16px;color:#64748b;">Gap</td><td style="text-align:right;font-weight:600;color:'+(oCtr>=bCtr2?'#16a34a':'#dc2626')+';">'+(bCtr2>0?(oCtr-bCtr2>=0?'+':'')+(oCtr-bCtr2).toFixed(2)+'%p':'—')+'</td></tr>';
    h += '<tr style="border-bottom:1px solid #e2e8f0;"><td style="padding:6px 0;color:#64748b;">PB CVR</td><td style="text-align:right;font-weight:600;">'+oCvr.toFixed(2)+'%</td><td style="padding-left:16px;color:#64748b;">3P 평균 CVR</td><td style="text-align:right;font-weight:600;">'+(benchCvr>0?benchCvr.toFixed(2)+'%':'—')+'</td><td style="padding-left:16px;color:#64748b;">Gap</td><td style="text-align:right;font-weight:600;color:'+(oCvr>=benchCvr?'#16a34a':'#dc2626')+';">'+(benchCvr>0?(oCvr-benchCvr>=0?'+':'')+(oCvr-benchCvr).toFixed(2)+'%p':'—')+'</td></tr>';
    h += '</table>';
    h += '<p style="margin-top:10px;"><span style="color:'+(cvrRatio>=80?'#16a34a':'#dc2626')+';font-weight:700;">▸ 주요 병목: '+bottleneck+'</span></p>';
    h += '<p style="color:#475569;font-size:13px;">→ '+recommendation+'</p>';
    h += '</div>';
  });
  h += '</div>';

  // ── 프로모션 효과 분석 with 3P comparison ──
  h += '<div class="section"><h4>📊 프로모션 효과 분석 (PB vs 3P 비교)</h4>';
  const promoWeeks = weeks.filter(w=>{const pm2=(D.weekly.promoMap||{})[w]||'';return pm2==='빅프로모션'||pm2==='스페셜브랜드위크';});
  const nonPromoWeeks = weeks.filter(w=>{const pm2=(D.weekly.promoMap||{})[w]||'';return pm2==='비프로모'||pm2==='평시주간'||pm2==='';});
  const tp3 = D.weekly.tp3WeeklyGmv || {};

  if(promoWeeks.length>0&&nonPromoWeeks.length>0){
    // PB promo vs non-promo
    let pbPromoGmv=0,pbPromoN=0,pbNonGmv=0,pbNonN=0;
    promoWeeks.forEach(w=>{const wS2=ws[w]||{};pbPromoGmv+=s(wS2.total,0);pbPromoN++;});
    nonPromoWeeks.forEach(w=>{const wS2=ws[w]||{};pbNonGmv+=s(wS2.total,0);pbNonN++;});
    const pbPromoAvg = pbPromoN>0?pbPromoGmv/pbPromoN:0;
    const pbNonAvg = pbNonN>0?pbNonGmv/pbNonN:0;
    const pbLift = pbNonAvg>0?((pbPromoAvg-pbNonAvg)/pbNonAvg*100):0;

    // 3P promo vs non-promo (aggregate 가구+패브릭+생활용품)
    let tp3PromoGmv=0,tp3PromoN=0,tp3NonGmv=0,tp3NonN=0;
    promoWeeks.forEach(w=>{
      let wTotal=0;
      Object.keys(tp3).forEach(cat=>{wTotal+=s(tp3[cat][w],0);});
      tp3PromoGmv+=wTotal; tp3PromoN++;
    });
    nonPromoWeeks.forEach(w=>{
      let wTotal=0;
      Object.keys(tp3).forEach(cat=>{wTotal+=s(tp3[cat][w],0);});
      tp3NonGmv+=wTotal; tp3NonN++;
    });
    const tp3PromoAvg = tp3PromoN>0?tp3PromoGmv/tp3PromoN:0;
    const tp3NonAvg = tp3NonN>0?tp3NonGmv/tp3NonN:0;
    const tp3Lift = tp3NonAvg>0?((tp3PromoAvg-tp3NonAvg)/tp3NonAvg*100):0;

    h += '<table style="width:100%;border-collapse:collapse;font-size:13px;margin:8px 0;">';
    h += '<thead><tr style="border-bottom:2px solid #e2e8f0;"><th style="text-align:left;padding:8px;color:#64748b;">구분</th><th style="text-align:right;padding:8px;">프로모션 주간 평균</th><th style="text-align:right;padding:8px;">비프로모 주간 평균</th><th style="text-align:right;padding:8px;">리프트</th></tr></thead>';
    h += '<tbody>';
    h += '<tr style="border-bottom:1px solid #f1f5f9;"><td style="padding:8px;font-weight:600;">PB</td><td style="text-align:right;padding:8px;">'+fMw(pbPromoAvg)+'백만원</td><td style="text-align:right;padding:8px;">'+fMw(pbNonAvg)+'백만원</td><td style="text-align:right;padding:8px;font-weight:700;color:'+(pbLift>0?'#16a34a':'#dc2626')+';">'+pbLift.toFixed(1)+'%</td></tr>';
    h += '<tr style="border-bottom:1px solid #f1f5f9;"><td style="padding:8px;font-weight:600;">3P (동일 카테고리)</td><td style="text-align:right;padding:8px;">'+fMw(tp3PromoAvg)+'백만원</td><td style="text-align:right;padding:8px;">'+fMw(tp3NonAvg)+'백만원</td><td style="text-align:right;padding:8px;font-weight:700;color:'+(tp3Lift>0?'#16a34a':'#dc2626')+';">'+tp3Lift.toFixed(1)+'%</td></tr>';
    h += '</tbody></table>';

    if(pbLift>tp3Lift){
      h += '<p style="color:#16a34a;font-weight:600;">✅ PB 프로모션 리프트('+pbLift.toFixed(1)+'%)가 3P('+tp3Lift.toFixed(1)+'%)보다 높습니다. 프로모션 효과가 상대적으로 큽니다.</p>';
    } else {
      h += '<p style="color:#dc2626;font-weight:600;">⚠️ PB 프로모션 리프트('+pbLift.toFixed(1)+'%)가 3P('+tp3Lift.toFixed(1)+'%)보다 낮습니다. 프로모션 활용도 개선이 필요합니다.</p>';
    }
  } else {
    h += '<p>프로모션/비프로모 주간 비교 데이터가 부족합니다.</p>';
  }
  h += '</div>';

  // 6주 추이: TEXT → VISUAL BAR CHART
  h += '<div class="section"><h4>📉 6주 GMV 추이</h4>';
  // Find max GMV for scaling
  let maxWGmv = 0;
  weeks.forEach(w=>{const wS3=ws[w]||{};const t=s(wS3.total,0);if(t>maxWGmv)maxWGmv=t;});

  h += '<div style="display:flex;flex-direction:column;gap:8px;">';
  weeks.forEach(w=>{
    const wS3 = ws[w]||{};
    const total = s(wS3.total,0);
    const pct = maxWGmv>0?(total/maxWGmv*100):0;
    const pm3 = (D.weekly.promoMap||{})[w] || '';
    const barColor = pm3==='빅프로모션'?'#ef4444':pm3==='스페셜브랜드위크'?'#3b82f6':pm3.includes('진행중')?'#f59e0b':'#94a3b8';

    h += '<div style="display:flex;align-items:center;gap:8px;">';
    h += '<span style="min-width:80px;font-size:12px;color:#64748b;text-align:right;">'+weekRange(w)+'</span>';
    h += '<div style="flex:1;background:#f1f5f9;border-radius:4px;height:28px;position:relative;overflow:hidden;">';
    h += '<div style="width:'+pct.toFixed(1)+'%;height:100%;background:'+barColor+';border-radius:4px;transition:width 0.3s;display:flex;align-items:center;justify-content:flex-end;padding-right:8px;">';
    h += '<span style="font-size:11px;font-weight:700;color:#fff;white-space:nowrap;">'+fMw(total)+'백만원</span>';
    h += '</div></div>';
    h += '<span style="min-width:80px;font-size:11px;color:#64748b;">'+pm3+'</span>';
    h += '</div>';
  });
  h += '</div>';
  h += '<div style="margin-top:8px;font-size:11px;color:#94a3b8;display:flex;gap:12px;">';
  h += '<span>🔴 빅프로모션</span><span>🔵 스페셜브랜드위크</span><span>🟡 진행중</span><span>⚪ 비프로모/평시</span>';
  h += '</div></div>';
  h += '</div>';

  // Period navigation table
  h += '<div id="weeklyTableWrap"></div>';

  document.getElementById('panel-weekly').innerHTML = h;

  // Table rendering with period nav
  let curWeekIdx = weeks.length - 1;
  function renderWeeklyTable() {
    const w = weeks[curWeekIdx];
    let t = '<div class="period-nav">';
    t += '<button '+(curWeekIdx<=0?'disabled':'')+' id="wkPrev">← 이전주</button>';
    t += '<span class="period-label">'+weekRange(w)+promoTag(w)+'</span>';
    t += '<button '+(curWeekIdx>=weeks.length-1?'disabled':'')+' id="wkNext">다음주 →</button>';
    t += '</div>';

    t += '<div class="tbl-wrap"><table id="tbl-weekly"><thead><tr>';
    t += '<th data-col="name" data-dir="asc">제품명 <span class="arr">↕</span></th>';
    t += '<th data-col="cat">카테고리 <span class="arr">↕</span></th>';
    t += '<th data-col="gmv" data-dir="desc" class="sorted">GMV <span class="arr">▼</span></th>';
    t += '<th data-col="imp">노출 <span class="arr">↕</span></th>';
    t += '<th data-col="ctr">CTR(%) <span class="arr">↕</span></th>';
    t += '<th data-col="benchCtr">카테고리 평균 CTR <span class="arr">↕</span></th>';
    t += '<th data-col="pdp">PDP <span class="arr">↕</span></th>';
    t += '<th data-col="buy">구매자수 <span class="arr">↕</span></th>';
    t += '<th data-col="cvr">CVR(%) <span class="arr">↕</span></th>';
    t += '<th data-col="bench">카테고리 평균 CVR <span class="arr">↕</span></th>';
    t += '</tr></thead><tbody>';

    const sortedProds = prods.map(p=>{
      const wd2=(p.weekly||{})[w]||{};
      return {...p,wGmv:s(wd2.gmv,0),wImp:s(wd2.imp,0),wPdp:s(wd2.pdpUv,0),wBuy:s(wd2.buyUv,0),wCvr:s(wd2.cvr,null),wBench:s(wd2.bench3p,null)};
    }).filter(p=>p.wGmv>0).sort((a,b)=>b.wGmv-a.wGmv);

    sortedProds.forEach(p=>{
      const ctr=(p.wImp&&p.wPdp&&p.wImp>0)?(p.wPdp/p.wImp*100).toFixed(2):null;
      const cls=cvrCls(p.wCvr,p.wBench);
      const ctrN=ctr?parseFloat(ctr):null;
      const ctrCls2=cvrCls(ctrN,null);
      t += '<tr>';
      t += '<td title="'+p.name+'">'+p.name+'</td>';
      t += '<td>'+p.cate1+'/'+p.cate2+'</td>';
      t += '<td>'+fMw(p.wGmv)+'</td>';
      t += '<td>'+fN(p.wImp)+'</td>';
      t += '<td>'+(ctr!==null?'<span class="cvr-pill '+ctrCls2+'">'+ctr+'%</span>':'—')+'</td>';
      t += '<td>—</td>';
      t += '<td>'+fN(p.wPdp)+'</td>';
      t += '<td>'+(p.wBuy!==null?p.wBuy:'—')+'</td>';
      t += '<td><span class="cvr-pill '+cls+'">'+(p.wCvr!==null?fP(p.wCvr):'—')+'</span></td>';
      t += '<td>'+(p.wBench!==null?fP(p.wBench):'—')+gapBadge(p.wCvr,p.wBench)+'</td>';
      t += '</tr>';
    });
    t += '</tbody></table></div>';

    document.getElementById('weeklyTableWrap').innerHTML = t;
    document.getElementById('wkPrev').onclick=()=>{curWeekIdx--;renderWeeklyTable();};
    document.getElementById('wkNext').onclick=()=>{curWeekIdx++;renderWeeklyTable();};
    setupSort('tbl-weekly');
  }
  renderWeeklyTable();
}

// ═══════════════════════════════════
// MONTHLY PANEL
// ═══════════════════════════════════
function renderMonthly(){
  const md = D.monthly;
  const months = md.months || [];
  const ms = md.summary || {};
  const prods = md.products || [];
  const bp3m = md.bp3CvrMonthly || {};

  if(months.length<2) return;
  const latest = months[months.length-1];
  const prev = months[months.length-2];
  const latestS = ms[latest]||{};
  const prevS = ms[prev]||{};
  const totalChg = fPct(s(latestS.total,0), s(prevS.total,0));

  let h = '';
  // Summary
  h += '<div class="cards">';
  h += '<div class="card"><div class="lbl">'+monthLabel(latest)+' GMV</div><div class="val">'+fMw(s(latestS.total,0))+'<span style="font-size:14px;color:#64748b;"> '+fGmvUnitW(s(latestS.total,0))+'</span></div><div class="chg '+totalChg.c+'">전월('+monthLabel(prev)+') 대비 '+totalChg.t+'</div></div>';

  const totalImp = prods.reduce((a,p)=>{const m=(p.monthly||{})[latest]||{};return a+s(m.imp,0);},0);
  const totalBuy = prods.reduce((a,p)=>{const m=(p.monthly||{})[latest]||{};return a+s(m.buyUv,0);},0);
  const totalPdp = prods.reduce((a,p)=>{const m=(p.monthly||{})[latest]||{};return a+s(m.pdpUv,0);},0);
  const avgCvr = totalPdp>0?(totalBuy/totalPdp*100).toFixed(2):'—';

  h += '<div class="card"><div class="lbl">총 노출</div><div class="val">'+fN(totalImp)+'</div></div>';
  h += '<div class="card"><div class="lbl">총 구매자수</div><div class="val">'+totalBuy.toLocaleString()+'<span style="font-size:14px;color:#64748b;"> 명</span></div></div>';
  h += '<div class="card"><div class="lbl">평균 전환율</div><div class="val">'+avgCvr+'<span style="font-size:14px;color:#64748b;">%</span></div></div>';
  h += '</div>';

  // Category cards - now 가구PB and 리빙PB
  h += '<div class="cat-grid">';
  const cats = [['가구PB','c-furniture'],['리빙PB','c-living']];
  cats.forEach(([catName,cls])=>{
    const curGmv = s(latestS[catName],0);
    const prevGmv = s(prevS[catName],0);
    const chg = fPct(curGmv,prevGmv);
    let bSum=0,bN=0;
    const orgs = D.orgMapping[catName]||[];
    orgs.forEach(orgCat=>{
      const benchKeys=Object.keys(bp3m).filter(k=>k.startsWith(orgCat+'|'));
      benchKeys.forEach(k=>{const v=(bp3m[k]||{})[latest];if(v!==undefined&&v!==null){bSum+=v;bN++;}});
    });
    const benchCvr = bN>0?(bSum/bN).toFixed(2):'—';
    const catProds = prods.filter(p=>{
      const orgCats = D.orgMapping[catName]||[];
      return orgCats.includes(p.cate1);
    });
    let lBuy=0,lPdp=0;
    catProds.forEach(p=>{const m=(p.monthly||{})[latest]||{};lBuy+=s(m.buyUv,0);lPdp+=s(m.pdpUv,0);});
    const pbCvr = lPdp>0?(lBuy/lPdp*100).toFixed(2):'—';

    h += '<div class="cat-card '+cls+'">';
    h += '<h3>'+catName+'</h3>';
    h += '<div class="cat-row"><span class="k">GMV ('+monthLabel(latest)+')</span><span class="v">'+fMw(curGmv)+' 백만원</span></div>';
    h += '<div class="cat-row"><span class="k">전월 대비</span><span class="v '+chg.c+'">'+chg.t+'</span></div>';
    h += '<div class="cat-row"><span class="k">PB 평균 CVR</span><span class="v">'+pbCvr+'%</span></div>';
    h += '<div class="cat-row"><span class="k">카테고리 평균 CVR</span><span class="v">'+benchCvr+'%</span></div>';
    if(pbCvr!=='—'&&benchCvr!=='—'){
      const gap = (parseFloat(pbCvr)-parseFloat(benchCvr)).toFixed(2);
      const gc = parseFloat(gap)>=0?'good':'bad';
      h += '<div class="cat-row"><span class="k">Gap</span><span class="v '+gc+'">'+(parseFloat(gap)>=0?'+':'')+gap+'%p</span></div>';
    }
    h += '</div>';
  });
  h += '</div>';

  // Insights
  h += '<div class="insight-box">';
  h += '<h3>📊 월간 분석 인사이트 — '+monthLabel(latest)+'</h3>';
  h += '<div class="section"><h4>📈 월간 매출 동향</h4>';
  h += '<p>'+monthLabel(latest)+' PB 전체 GMV는 <span class="hl">'+fMw(s(latestS.total,0))+' 백만원</span>으로 ';
  h += '전월('+monthLabel(prev)+') <span class="hl">'+fMw(s(prevS.total,0))+' 백만원</span> 대비 ';
  h += '<span class="'+(totalChg.c==='up'?'up-hl':'dn-hl')+'">'+totalChg.t+'</span> ';
  h += (totalChg.c==='down'?'감소':'성장')+'했습니다. ';
  cats.forEach(([catName])=>{
    const cur = s(latestS[catName],0);
    const prv2 = s(prevS[catName],0);
    const cc = fPct(cur,prv2);
    h += catName+' '+fMw(cur)+'백만원(<span class="'+(cc.c==='up'?'up-hl':'dn-hl')+'">'+cc.t+'</span>), ';
  });
  h += '</p>';

  // 3-month trend
  h += '</div><div class="section"><h4>📉 3개월 추이</h4><p>';
  months.forEach((m,i)=>{
    const mS = ms[m]||{};
    h += monthLabel(m)+': <span class="hl">'+fMw(s(mS.total,0))+'백만원</span>';
    if(i<months.length-1)h+=' → ';
  });
  h += '</p></div>';

  const moProds = prods.map(p=>{const m=(p.monthly||{})[latest]||{};return{...p,latestGmv:s(m.gmv,0),latestCvr:s(m.cvr,null),latestBench:s(m.bench3p,null)};}).sort((a,b)=>b.latestGmv-a.latestGmv);
  const top3m = moProds.filter(p=>p.latestGmv>0).slice(0,3);
  h += '<div class="section"><h4>🏆 월간 상위 제품</h4><p>';
  top3m.forEach((p,i)=>{
    const share = s(latestS.total,0)>0?(p.latestGmv/s(latestS.total,0)*100).toFixed(1):'0';
    h += '<span class="hl">'+(i+1)+'. '+p.name.substring(0,30)+'</span> ('+fMw(p.latestGmv)+'백만원, '+share+'%)';
    if(i<2)h+=', ';
  });
  h += '.</p></div>';

  // Monthly org unit diagnostic
  h += '<div class="section"><h4>🔍 조직별 월간 퍼널 진단</h4>';
  const moOrgMap = D.orgMapping || {};
  Object.keys(moOrgMap).forEach(orgName=>{
    const orgCats = moOrgMap[orgName] || [];
    const orgProds2 = prods.filter(p=>orgCats.includes(p.cate1));
    let moI=0,moP=0,moB=0,moG=0;
    orgProds2.forEach(p=>{
      const m2=(p.monthly||{})[latest]||{};
      moI+=s(m2.imp,0); moP+=s(m2.pdpUv,0); moB+=s(m2.buyUv,0); moG+=s(m2.gmv,0);
    });
    const moCtr=moI>0?(moP/moI*100):0;
    const moCvr=moP>0?(moB/moP*100):0;
    // Monthly 3P benchmark
    let mbCS=0,mbCV=0,mbN=0;
    Object.keys(bp3m).forEach(k=>{
      const c1=k.split('|')[0];
      if(orgCats.includes(c1)){const v=(bp3m[k]||{})[latest];if(v!==undefined&&v!==null){mbCV+=v;mbN++;} }
    });
    const mBenchCvr=mbN>0?(mbCV/mbN):0;
    const mCvrRatio=mBenchCvr>0?(moCvr/mBenchCvr*100):0;

    let mBn='',mRc='';
    if(moI<50000){mBn='노출 부족';mRc='검색 키워드 확장, 기획전 노출 확보';}
    else if(moCtr<2.0){mBn='CTR 미달';mRc='썸네일/리스팅 최적화 필요';}
    else if(mCvrRatio<60){mBn='CVR 구조적 문제 (3P 평균 대비 '+mCvrRatio.toFixed(0)+'%)';mRc='PDP 콘텐츠/리뷰/가격 점검';}
    else if(mCvrRatio<80){mBn='CVR 소폭 미달 (3P 평균 대비 '+mCvrRatio.toFixed(0)+'%)';mRc='상세 페이지 개선 여지';}
    else{mBn='퍼널 양호 (3P 평균 대비 '+mCvrRatio.toFixed(0)+'%)';mRc='노출 확대로 성장 가능';}

    h += '<div style="margin:12px 0;padding:16px;background:#f8fafc;border-radius:8px;border-left:3px solid '+(orgName==='가구PB'?'#3b82f6':'#f59e0b')+';">';
    h += '<p style="font-weight:700;font-size:15px;margin-bottom:10px;">'+orgName+'</p>';
    h += '<table style="width:100%;font-size:13px;border-collapse:collapse;">';
    h += '<tr style="border-bottom:1px solid #e2e8f0;"><td style="padding:6px 0;color:#64748b;">노출</td><td style="text-align:right;font-weight:600;">'+fN(moI)+'</td><td style="padding-left:16px;color:#64748b;">PDP</td><td style="text-align:right;font-weight:600;">'+fN(moP)+'</td><td style="padding-left:16px;color:#64748b;">구매</td><td style="text-align:right;font-weight:600;">'+moB+'명</td></tr>';
    h += '<tr style="border-bottom:1px solid #e2e8f0;"><td style="padding:6px 0;color:#64748b;">PB CTR</td><td style="text-align:right;font-weight:600;">'+moCtr.toFixed(2)+'%</td><td colspan="4"></td></tr>';
    h += '<tr style="border-bottom:1px solid #e2e8f0;"><td style="padding:6px 0;color:#64748b;">PB CVR</td><td style="text-align:right;font-weight:600;">'+moCvr.toFixed(2)+'%</td><td style="padding-left:16px;color:#64748b;">3P 평균 CVR</td><td style="text-align:right;font-weight:600;">'+(mBenchCvr>0?mBenchCvr.toFixed(2)+'%':'—')+'</td><td style="padding-left:16px;color:#64748b;">비율</td><td style="text-align:right;font-weight:600;color:'+(mCvrRatio>=80?'#16a34a':'#dc2626')+';">'+(mCvrRatio>0?mCvrRatio.toFixed(0)+'%':'—')+'</td></tr>';
    h += '</table>';
    h += '<p style="margin-top:10px;"><span style="color:'+(mCvrRatio>=80?'#16a34a':'#dc2626')+';font-weight:700;">▸ '+mBn+'</span> <span style="color:#64748b;font-size:12px;">→ '+mRc+'</span></p>';
    h += '</div>';
  });
  h += '</div>';

  // Month-over-month comparison table
  h += '<div class="section"><h4>📊 월별 핵심 지표 비교</h4>';
  h += '<table style="width:100%;border-collapse:collapse;font-size:13px;">';
  h += '<thead><tr style="border-bottom:2px solid #e2e8f0;"><th style="text-align:left;padding:8px;">월</th><th style="text-align:right;padding:8px;">GMV</th><th style="text-align:right;padding:8px;">가구PB</th><th style="text-align:right;padding:8px;">리빙PB</th><th style="text-align:right;padding:8px;">MoM</th></tr></thead>';
  h += '<tbody>';
  months.forEach((m,i)=>{
    const mS2 = ms[m]||{};
    const total2 = s(mS2.total,0);
    const furGmv = s(mS2['가구PB'],0);
    const livGmv = s(mS2['리빙PB'],0);
    const prevTotal = i>0?s((ms[months[i-1]]||{}).total,0):0;
    const mom = prevTotal>0?((total2-prevTotal)/prevTotal*100):'—';
    h += '<tr style="border-bottom:1px solid #f1f5f9;">';
    h += '<td style="padding:8px;font-weight:600;">'+monthLabel(m)+'</td>';
    h += '<td style="text-align:right;padding:8px;">'+fMw(total2)+'백만원</td>';
    h += '<td style="text-align:right;padding:8px;">'+fMw(furGmv)+'백만원</td>';
    h += '<td style="text-align:right;padding:8px;">'+fMw(livGmv)+'백만원</td>';
    h += '<td style="text-align:right;padding:8px;font-weight:700;color:'+(typeof mom==='number'?(mom>=0?'#16a34a':'#dc2626'):'#64748b')+';">'+(typeof mom==='number'?(mom>=0?'+':'')+mom.toFixed(1)+'%':'—')+'</td>';
    h += '</tr>';
  });
  h += '</tbody></table></div>';
  h += '</div>';

  h += '<div id="monthlyTableWrap"></div>';

  document.getElementById('panel-monthly').innerHTML = h;

  let curMonthIdx = months.length - 1;
  function renderMonthlyTable() {
    const m = months[curMonthIdx];
    let t = '<div class="period-nav">';
    t += '<button '+(curMonthIdx<=0?'disabled':'')+' id="moPrev">← 이전월</button>';
    t += '<span class="period-label">'+monthLabel(m)+'</span>';
    t += '<button '+(curMonthIdx>=months.length-1?'disabled':'')+' id="moNext">다음월 →</button>';
    t += '</div>';

    t += '<div class="tbl-wrap"><table id="tbl-monthly"><thead><tr>';
    t += '<th data-col="name" data-dir="asc">제품명 <span class="arr">↕</span></th>';
    t += '<th data-col="cat">카테고리 <span class="arr">↕</span></th>';
    t += '<th data-col="gmv" data-dir="desc" class="sorted">GMV <span class="arr">▼</span></th>';
    t += '<th data-col="imp">노출 <span class="arr">↕</span></th>';
    t += '<th data-col="ctr">CTR(%) <span class="arr">↕</span></th>';
    t += '<th data-col="benchCtr">카테고리 평균 CTR <span class="arr">↕</span></th>';
    t += '<th data-col="pdp">PDP <span class="arr">↕</span></th>';
    t += '<th data-col="buy">구매자수 <span class="arr">↕</span></th>';
    t += '<th data-col="cvr">CVR(%) <span class="arr">↕</span></th>';
    t += '<th data-col="bench">카테고리 평균 CVR <span class="arr">↕</span></th>';
    t += '</tr></thead><tbody>';

    const sortedProds = prods.map(p=>{
      const md2=(p.monthly||{})[m]||{};
      return {...p,mGmv:s(md2.gmv,0),mImp:s(md2.imp,0),mPdp:s(md2.pdpUv,0),mBuy:s(md2.buyUv,0),mCvr:s(md2.cvr,null),mBench:s(md2.bench3p,null)};
    }).filter(p=>p.mGmv>0).sort((a,b)=>b.mGmv-a.mGmv);

    sortedProds.forEach(p=>{
      const ctr=(p.mImp&&p.mPdp&&p.mImp>0)?(p.mPdp/p.mImp*100).toFixed(2):null;
      const cls=cvrCls(p.mCvr,p.mBench);
      const ctrN=ctr?parseFloat(ctr):null;
      const ctrCls2=cvrCls(ctrN,null);
      t += '<tr>';
      t += '<td title="'+p.name+'">'+p.name+'</td>';
      t += '<td>'+p.cate1+'/'+p.cate2+'</td>';
      t += '<td>'+fMw(p.mGmv)+'</td>';
      t += '<td>'+fN(p.mImp)+'</td>';
      t += '<td>'+(ctr!==null?'<span class="cvr-pill '+ctrCls2+'">'+ctr+'%</span>':'—')+'</td>';
      t += '<td>—</td>';
      t += '<td>'+fN(p.mPdp)+'</td>';
      t += '<td>'+(p.mBuy!==null?p.mBuy:'—')+'</td>';
      t += '<td><span class="cvr-pill '+cls+'">'+(p.mCvr!==null?fP(p.mCvr):'—')+'</span></td>';
      t += '<td>'+(p.mBench!==null?fP(p.mBench):'—')+gapBadge(p.mCvr,p.mBench)+'</td>';
      t += '</tr>';
    });
    t += '</tbody></table></div>';

    document.getElementById('monthlyTableWrap').innerHTML = t;
    document.getElementById('moPrev').onclick=()=>{curMonthIdx--;renderMonthlyTable();};
    document.getElementById('moNext').onclick=()=>{curMonthIdx++;renderMonthlyTable();};
    setupSort('tbl-monthly');
  }
  renderMonthlyTable();
}

// ── Column sort ──
function setupSort(tblId, data){
  const tbl = document.getElementById(tblId);
  if(!tbl) return;
  tbl.querySelectorAll('th[data-col]').forEach(th=>{
    th.addEventListener('click',()=>{
      const col = th.dataset.col;
      const dir = th.dataset.dir === 'asc' ? 'desc' : 'asc';
      th.dataset.dir = dir;
      // Reset arrows
      tbl.querySelectorAll('th').forEach(t=>{t.classList.remove('sorted');const a=t.querySelector('.arr');if(a)a.textContent='↕';});
      th.classList.add('sorted');
      const arrow = th.querySelector('.arr');
      if(arrow) arrow.textContent = dir==='asc'?'▲':'▼';

      const tbody = tbl.querySelector('tbody');
      const rows = Array.from(tbody.querySelectorAll('tr'));
      rows.sort((a,b)=>{
        let av,bv;
        const ci = Array.from(th.parentNode.children).indexOf(th);
        const ac = a.children[ci], bc = b.children[ci];
        if(!ac||!bc) return 0;
        av = ac.textContent.replace(/[,%만K백]/g,'').trim();
        bv = bc.textContent.replace(/[,%만K백]/g,'').trim();
        if(av==='—') av = dir==='asc'?Infinity:-Infinity;
        if(bv==='—') bv = dir==='asc'?Infinity:-Infinity;
        const an = parseFloat(av), bn = parseFloat(bv);
        if(!isNaN(an)&&!isNaN(bn)) return dir==='asc'?an-bn:bn-an;
        return dir==='asc'?String(av).localeCompare(String(bv),'ko'):String(bv).localeCompare(String(av),'ko');
      });
      rows.forEach(r=>tbody.appendChild(r));
    });
  });
}

// ── Init ──
renderDaily();
renderWeekly();
renderMonthly();
</script>
